body:
  text: 儒行集傳卷下明黃道周撰儒仕章第九儒有一畝之宫環堵之室篳門圭窬蓬户甕牖易衣而出并曰而食上答之不敢以疑上不答不敢以諂其仕有如此者不仕者臣之志也仕者臣之義也為貧而仕則其仕已賤矣仕而不失其貧則其仕已貴矣篳門圭窬蓬户甕牖士之素也秉素而行之於仕不仕無所加損也上答之而有大用之心上不答之而有屈躬之事此小人所志君子之所恥也節之需曰安節亨象曰安節之亨承上道也節之臨曰甘節吉往有尚象曰甘節之吉居位中也此二者言夫抱節而仕者也不出門庭苦節貞凶言夫抱節而不仕者也仕而有不仕之心雖聖賢亦為之不仕而有仕之心雖盜賊亦為之道命未窮委運安流抱關擊柝猶之環堵也人臣以是事其君故其上不疑下不諂職業修而鄙競黜也蕭望之初以丙吉薦得召見也時有燕蓋之事令見者夾持露索望之不肯自引出因説大將軍以吐握之事於是獨不除用望之同見露索者俱除大將軍史不三歲至光祿大夫而望之方射策為郎署小苑東門候同見者王仲翁行顧之曰不肯鹿鹿反抱關為望之曰各從所好又何問焉若望之者可謂上答之不疑上不答之不諂者矣然為望之則已戅為丙吉則可也後漢士益嚴苦自勵其初有范遷好學家貧獨宅數畝田一頃復推與兄子其妻謂之曰君有子無立錐之地餘祿可為後業遷曰吾備位大臣而蓄祿自封何恥如之卒之日家無擔石焉宣秉雲陽人少修髙節見王氏専國有逆萌輒遁去後歸世祖為中丞常布衣蔬食瓦器居室蕭然上歎曰楚國兩龔不如雲陽宣巨公故范遷宣秉未嘗不仕也而常若未仕故曰其仕有如此者范丹史雲恥為縣吏嘗棄衣物道邊家疑已死遂西入關從學學成為萊蕪長去官於市賣卜紡繢以自給辟公府無被囊自隨嘗使兒捃麥得五斛鄉人遺之一斛囑兒曰莫令尊君知兒歸道之丹言麥已雜輒棄不取弟子見丹家藩不完載柴藩之丹還見藩有異輒拔柴還弟子閭里為之歌曰甑中生塵范史雲釡中生魚范萊蕪若范丹可謂仕常若不仕者矣孔奮君魚少從劉歆受春秋問難出意表歆謂門人曰吾已從君魚受道矣竇融請守姑臧長四年猶若諸生時或笑之曰君魚身處膏脂不能自潤奮守之不變也事母孝極其珍養而身與妻子同茹蔬後拜武都太守單車就道一無所資云吳祐季英父恢為南海太守祐年十二從官父欲殺青寫經書祐諫曰南海踰越五嶺寫書成載之兼兩上為國家所疑下為權貴所望是薏苡所興謗也恢撫其頂曰吳氏世不乏季子矣二十喪父居無擔石自牧豕於長垣澤中後舉孝亷為大將軍長史質責馬融之誣李固也遂棄官灌園終身如孔奮吳祐者亦可謂上答不疑不答不諂者矣劉實子真少貧好學賣牛衣自給手約繩目誦書博通古今以世多進趨亷讓道缺著崇讓論以風之及位望通顯而居猶無第宅喪妻為廬杖之制終身不御內弟智亦與共操每負薪自給誦讀不輟管輅謂人曰與劉潁川兄弟語使人神思清發昏不假寐胡質汝德為荆州厲操清白子威自京都來省家貧無車馬僮僕自驅驢單行留宿十餘日告歸質賜絹為齎資威跪曰大人清白於何得此質曰吾俸餘耳威受之辭歸每早晚旅宿自放驢取樵炊爨食畢隨徒旅復行質悵下督聞威將歸先請假還家陰齎裝至百餘里要為徒并行時時佐營之間進飲食質聞遂除督名其清慎如此後威歷宰牧晉武帝召見歎其父清謂威曰卿清何如父威謝不如上問何謂不如威曰臣父清恐人知臣清恐人不知故守約而仕不疑不諂劉實胡威有焉然而子真汝德則猶見答於上也李胤宣伯祖敏為河內太守去官還遼東公孫度欲用之敏一夕浮海去不知所終胤父信泛海求不得遂不娶徐邈勸之乃娶坐胤遂不入內終身如居喪胤以三世孤苦自有識輒貶食毁容以喪禮自居後仕為樂平侯相及至御史中丞晉司徒猶蕭然如布衣身沒家無餘財子孫守其貧儉焉吳隱之處默美姿容善談論博涉文史以儒雅標名而性特貞介一毫不苟取喪母哭泣有雙鶴警叫之祥韓康伯母所謂銓衡當用此人者也為晉陵太守妻猶自負薪為廣州還妻拾沈香一片舉而投之水及為盧循所得劉裕請之歸家惟芽屋六間不容妻子及拜太常以竹篷為屏風坐無氊席及為中領軍每月初得祿裁留身糧其餘悉分帳親族家人紡績以供朝夕世所稱夷齊不飲貪泉者也故守約而仕不疑不諂李胤吳隱之亦有焉傅昭晉司隸咸之孫也父琰善三禮以竟陵王事坐誅昭甫六歲哀毀如成人嘗於朱雀橋鬻情神不凡為名流賞識丹陽尹袁粲辟為縣主簿每經昭廨寂無聲入其室儼如也入梁為安成內史異物毒蟲不敢為害遷臨海太守郡有蜜巖前後太守皆封為利昭發與民公之縣令來餉粟置絹其上昭笑而還之子婦家嘗餉牛肉昭受而瘞之日端居以書史自娛無所請謁故雖身事三朝而清名不損云江革少孤貧無師資與弟觀自相訓勗吏部郎謝胱識之天大雪見革敝絮單席誦經史不倦因割半氊為充卧具而去建安王辟為參軍弟不忍離請同行因署記室任昉歎曰雍府可謂御二龍矣後為廣陵太守陷於魏王延明令為大八寺碑文厲色曰己誓不為人執筆及還朝上舉酒屬革曰卿何不畏王延明對曰臣誼當死又何畏乎既除武陵王長史門生故吏餉遺悉不受除都官尚書惟乘臺舸濟江舟人嫌舟輕革於西陵岸取石十餘片充之而濟故雖嘗陷魏而風操益厲如傅昭江革亦可謂不疑不諂矣而傅昭江革猶以此見答於上元德秀紫芝少孤事母孝將應舉自負母偕之京師比入官自以板輿輦母行母亡廬墓側食不鹽酪無爪剪者三年傷居貧不及親娶遂不肯婚足子在襁褓失母貧無乳德秀自乳之居數日潼流比能食乃止仕為魯山令玄京在東都命三百里內守令大合樂德秀惟令樂工數十人連袂歌于蒍于玄宗聞之曰賢人之言也德秀居所得俸悉以給孤遺歲滿笥惟一縑駕柴車而去愛陸渾山水居焉不為墻垣扃鑰家無婢僕歲飢或連不爨彈琴讀書陶然也陽城亢宗貧不能得書求隸集賢院竊院書讀之晝夜不出户六年學益通去隱中條山與弟階域友愛甚常易衣而出年長不肯娶謂弟曰吾與若孤惸相育既娶益疏吾不忍也嘗有借喪欲省之不忍别遂三人偕往而還值絶糧奴出求米奴醉仆于路怪其久乃共負之歸醒而跪謝城曰寒而飲又何謝李泌薦召為諫議大夫居數年猶未肯言及裴延齡傾陸贄坐貶乃帥諸言官守延英門論延齡姦佞贄等無罪宜召還會疏草為李繁所泄上大怒以為朋黨欲罪之賴太子救得免上猶欲相延齡城以為儻相當取白麻裂之也遷國子司業以匿太學生唐約故出刺道州自署下考觀察遣判官督賦行至州怪城不出迎以問吏吏曰刺史自以有罪先就獄矣判官驚立馳去其約已庇民如此元德秀陽城皆古今髙行然率不娶詭於中道至其一畝環堵易衣并日信其志不遷於上儒者之難能也故不疑不諂則元德秀陽城有焉徐積仲車從胡安定學使讀孝經以少失父輒流涕父名石終身不御石器行遇石時怵然避之事母處窮巷奉養隆備年逾壯未娶或勉之積曰娶非其人恐為母憂廬墓之後逢晦冥風雨必哀伏號泣中屏居里次蓬茅不掩而農父樵夫瞻仰若神明以近臣薦授楚州教授每與學者言以治心養氣為先曰言其所善行其所善思其所善如此而不為君子未之有也言其不善行其不善思其不善如此而不為小人未之有也侯可少倜儻不羈己自改篤學多通視貴勢藐如也與申顔為友易衣而出營力均所入以給二家顔病徒步千里為求醫歸死矣目不瞑人曰其待侯君乎可撫之而瞑所代人營葬起人病者甚多家無擔石顧樂善不倦如此後知化成縣革其頽俗所為婚娶養送事甚具以韓魏公薦知涇陽鑿渠溉田以勸學新民為任道雖未大行而不疑不諂不耽於利祿徐積侯可有焉王樵淄川人咸平中契丹遊騎渡河家為俘即棄妻子挺身入契丹訪父母纍年不獲還山東刻木招魂葬立祠祠事如生哀動行路又為家屬之殘於兵者次第成服已望北太息曰身世如此欲自比於人可乎遂論兵擊劍遊塞下一驢負裝徒步輒千里晚年畫策干何承矩耿望求滅遼復讐不用乃於城隅纍磚自環謂之繭室病革掩户卒其中范汝為豐縣人靖康之難家沒于金思報讐上書陳邊事假武功大夫奉國書遇完顔宗弼軍將殺之汝為曰死不足辭然銜命出疆願一逹國書死未晚乃解縛慰之命往見劉豫拒不可已金又致之豫汝為見豫陳禍福勉以忠義豫太息起立曰嗟乎君不見張邦昌乎使豫即自新南歸人豈有直之者哉業至此復何言授同知曹州固辭久之亡歸先是探金中機事輒蠟書聞已金知蠟書事召捕之秦檜欲械送金乃棄官變姓名為趙復徒步入蜀比檜死蜀中友人欲白其事汝為慨然曰吾結髮讀書中遭亂思為君父復讐頗謬為名公所知今老矣新貴人無知我者庸自理何為王樵范汝為皆遭艱難未遑為祿仕也而秉直道濱死不悔上答之不疑上不答不諂則王樵范汝為亦皆有焉馬伸弱冠登第崇寧中禁元祐學術程門宿學老生有叛去者伸自吏部求官西京法曹往依焉程頥以非其時恐為纍辭之伸執贄十往愈益恭且曰使伸得聞道死無憾況未必死乎且欲棄官而來先生歎曰能棄官則亦不須聞道也自是公暇雖風雨必造者三年同僚以飛語中之不顧也靖康之禍為書勸張邦昌極其懇切邦昌得書始定推戴之計髙宗即位以城陷不能救主遷不能死自劾帝慰諭之因言黃潛善汪伯彥不法十七事貶監濮酒稅以襆被就道卒居常言溝壑喪元是人生本事又云有志行道者如為身名妻子則去道萬里矣陳師道無已熙寧中士習王氏學遂絶意進取元祐中以蘇軾傅堯俞薦起為太學博士論者以非科目絀之調彭澤令不赴家或斷炊妻子愠見不恤也時章惇在樞府因秦觀招之以不傳贄不見王公為辭後以侍從交薦為徐州教授遷祕書正字從徽廟郊驟寒左丞趙挺之畀狐裘衣之師道鄙不受卒凍死故如馬仲陳師道者可謂上答之不疑上不答之不諂者矣臣觀古今清約諸臣上皆喜其潔躬而下多疑其矯物雖致用未宏而維風甚大聖門不以端木而絀原思則儒效可知矣憂思章第十儒有今人與居古人與稽今世行之後世以為楷適弗逢世上弗援下弗推讒諂之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者弗逢世而猶憂世非儒者則不能也儒者以百姓為性以後世為命百姓危其起居後世墜其楷式則是儒者失其性命也故世有古今志無伸絀憂思與已而不為固憂思及人而不為佞異道之學全身避患則不能及此也人臣以是事其君故仁人志士著於世也衛將軍文子問於子貢曰吾聞夫子之施教也先以詩書道以孝悌悅之以義而觀於禮成以文德蓋受教者七十有餘人孰為賢也子貢辭以不知文子曰吾子學焉何為不知也子貢對曰夫子之門人蓋三就焉賜有逮及有未及焉故不辨知文子曰吾子之所及請稽其行也子貢對曰夙興夜寐諷詩崇禮行不二過稱言不苟是顔淵之行也夫子説之以詩詩云媚兹一人應侯順德故逢有德之君世受顯命以御於天子顔淵有焉在貧如客使其臣如藉不遷怒不探怨不録舊罪是冉雍之行也夫子曰是有土君子足以使衆也不畏強禦不侮矜寡其言曰性都其富任其戎是仲由之行也詩曰受小共大共為下國恂蒙何天之寵夫子欲以是文之也恭老恤孤不忘賔旅好學省物而不勤是冉求之行也夫子語之曰好學則智恤孤則惠恭老則近禮其稱之也宜為國老志通而好文擯相兩君之事其有禮節也是公西赤之行也夫子曰禮儀三百可能也威儀三千則難也二三子欲學賔客之禮則於赤也滿而不滿實如虛過之如不及先生難之不學其貌竟其德敦其言於人無所不信其橋大人也常以皓皓是以眉夀是曾參之行也夫子曰孝德之始也弟德之序也信德之厚也忠德之正也參中夫四德者矣業功不伐貴位不羡不侮可侮不佚可佚不敖無告是顓孫師之行也夫子曰其不伐則猶可能也其不弊百姓則仁也詩云豈弟君子民之父母學以深厲以斷送迎必敬上友下交銀手如斷是卜商之行也夫子曰詩云式夷式已無小人殆商也可謂不險也貴之不喜賤之不怒苟於民利矣廉於事上以佐其下是淡臺滅明之行也夫子曰獨富獨貴君子恥之夫人中之矣先成其慮及事而用之是故不忘是言偃之行也夫子曰欲能則學欲知則問欲善則訊欲給則豫偃也得之矣獨居思仁公言言義一日三復白圭是南宫縚之行也夫子信其仁以為異姓自見夫子入户未嘗越屨往來過人不履影開蟄不殺方長不折執親之喪未嘗見齒是髙柴之行也夫子曰髙柴之執喪為難能也開蟄不殺則天道也方長不折則恕也恕則仁也湯敬以恕是以日躋此賜之所親睹也吾子有命賜則何足以知賢文子曰吾聞之也國有道則賢人興焉中人用焉百姓歸焉若吾子之語審茂則一諸侯之相也猶未逢明君也子貢歸而述文子之問以質告孔子聽然曰賜爾偉為知人子貢對曰賜焉能知人此賜所親睹也孔子曰吾語爾耳之所未聞目之所未睹者乎子貢負牆而聽孔子曰不克不忌不念舊惡蓋伯夷叔齊之行也晉平公問於祁奚曰羊舌大夫晉之良大夫也其行何如祁奚對曰不知也公曰吾聞汝少長乎其所蓋奄知之祁奚對曰其幼也恭而遜恥而不使其過宿也其為侯大夫也悉善則謙其端也其為公車尉也信而好直其功也其為和容也溫良而好禮博聞而時出其志也公曰嚮者以為弗知何也祁奚對曰每位改變未知所止是以不知蓋羊舌大夫之行也畏天而敬人服義而行信孝乎父而恭於兄好從善而斆往蓋趙文子之行也其事君也不敢愛其死然亦不亡其身謀其身不遺其友君陳則進不陳則行而退蓋隨武子之行也其為人之淵泉也多聞而難誕也不內辭足以沒世國有道其言足以生國無道其默足以容蓋桐提伯華之行也外寬而內直自設於隱括之中直已而不直人以善存亡汲汲蓋蘧伯玉之行也孝子慈幼允德秉義約貨去怨蓋栁下惠之行也其言曰君雖不量於臣臣不可以不量於其君是故君擇臣而使之臣擇君而事之有道順君無道橫命晏平仲之貧行也德恭而行信終日言不在尤之內在尤之外而樂也蓋老萊子之行也易行以俟天命居下位而不援其上觀於四方不忘其親苟思其親不盡其樂以不能學為已終身之憂蓋介山子推之行也君子之稽古者如此故今人與居古人與稽衛文子子貢有焉趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植於晉國不沒其身其知不足稱也曰其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子於是乎知人穆叔如晉范宣子郊迎問曰古之人有言死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲既沒其言立其是之謂乎豹聞之太上立德其次立功其次立言雖久不廢此之謂不朽若夫保姓受氏以守宗祊世不絶祀無國無之祿之大者不可謂不朽穆叔之智又不及叔譽矣以臧文仲之賢不及趙文子而髙自推許以陵大國宜其及矣雖然文子穆叔則猶有稽古之餘焉王烈彥方少師事陳仲弓敦義行著信於鄉里有盜牛者主得之請曰刑戮自甘乞不使王彥方知烈聞使遺布一端謝焉或問其故烈曰盜懼吾聞其過是有恥心既懷恥惡必能改過故以此激之後有父老遺劍於道一人見而守之至暮父老還尋得劍不告姓名而去迹之則前盜牛者也其為鄉里誦法如此其先有黃叔度憲年十四以成德著聞潁川荀淑至慎陽遇于逆旅竦然異之揖與語移日不能去謂叔度曰子吾之師表也既前至袁閎所未及勞問逆謂之曰子國有顔子寧識之乎閎曰見吾叔度耶是時同郡戴良才髙倨傲而見叔度未嘗不正容及歸惘然如有失也其母問曰汝復從牛醫兒來耶對曰良不見叔度不自謂不及既睹其人則瞻之在前忽焉在後難得而測矣同郡陳蕃周舉常相謂曰旬日之間不見黃生則鄙谷之萌復存乎心及蕃為三公臨朝歎曰若叔度在吾不敢先佩印綬矣故今世行之後世以為楷則黃憲王烈有焉周惇頥之初在南安年甚少有囚法不當死轉運使王逵欲殺之惇頥爭不得出太息曰殺人媚人吾不為也委告身欲去逵為感動得減死程珦時攝通守見其氣貌異之揖與語知其有得乃使二子受學焉在桂陽郡守李初平禮重之問曰吾欲學則何如惇頥曰公老無及矣然學固不専在書於是初平日咨道要密詣有造而程氏兄弟學成德尊皆親炙面命之力也邵雍初廬於百原山中學甚攻苦後見李之才授以物理性命之學刻勵自進不知寒暑數年道乃通出遊吳楚齊魯梁晉之間還歸洛陽潞鄭諸公皆尊禮之程純公每見其書輒歎曰此內聖外王之學也逺近學者從問經義曰應不窮問與論天下事雖究心世務者不及也司馬君實足事之而純德篤行俱為鄉校所宗鄉人每相戒曰毋為不善恐司馬學士邵先生知也故今世行之後世以為楷則周惇頥邵雍亦有焉胡瑗翼之少讀書山中十年不歸得家問見署平安字即投澗中不發也久之學成以范文正公聘主湖州學一準古成德達材之教科條具備要以明體適用為本使學者正逹有就頑傲有革也弟子往來常數百人各以經轉授受行之數年東南之士大興於禮樂後天子用大臣言建太學京師下湖州取瑗所教士為之式及召為國子直講益拓前規於文章經學兵農水利之事皆條别為諸生折衷禮部貢舉所得士十常四五焉南渡後有陸賀者治蔬圃藥畦為業力學躬行其家冠婚喪祭悉依涑水家禮行之子六人各依所能為業而九齡九韶九淵並以學行聞九齡所定家制以孝弟仁義忠信為本其子弟各以六經語孟諸史分習共論不為科舉之業其家用以田畝所入除租稅播種修葺廬舍之外以十分分之留三分為水旱不測之需贏五年而外以給婚娶一分為祭祀之用六分為十二月之用閏月則分為十三月折三十日用其一務餘三分合月而計之以為賔客餽送弔死問疾之需伏臘裘葛亦取於是九韶又以訓誡之詞為韻語晨興率子弟謁先祠畢擊鼓誦使列聽之是為金溪陸氏之學故今世行之後世以為楷胡瑗陸賀亦有焉劉安世器之從司馬光學得無妄之旨力行之嘗論章惇蔡確黃履邢恕以為四凶又言惇父在別籍異財滅絶理義又論蔡確大不敬竄新州進諫議大夫時宰有調停之説引鄧潤甫為翰林承旨安世言潤甫出入王吕之門終始反覆今進用實消長大關力爭之不報遂請祠惇修怨貶知南安軍徙新州又安置英州同文館獄起蔡京乞誅滅安世家徙梅州惇與京卞猶不快擢一土豪為轉運判官必殺之判官疾馳至梅守遣客來勸安世自為計安世嶷然對客如平時徐書數紙經紀同貶者家事付僕曰我死依此行之夜半聞鐘聲僕驚起問則判官未至二十里嘔血死矣安世方鼾睡如雷也劉婕妤立為后惇卞發安世司諫時及范祖禹諫乳媪事以為后發逮赴獄會徽宗立而免還知鄆州京當國又七謫羈管峽州後稍復承議郎卒蘇軾論當世人才必曰器之真鐡漢云陳瓘瑩中紹聖初判明州章惇赴召聞其名請與同泛瓘因問為政何先惇曰司馬光姦邪所當先辨瓘以乘舟譬之以為移勢偏重必失衆心章惇色厲甚瓘從容應之勸以中道消朋黨惇頗納之至都召為太學博士時蔡卞禁太學生不得為元祐學術議毁資治通鑑瓘因策士引神考通鑑序為問以是得不毁元符初為左司諫議論務持平不以細過摘發惟論蔡卞章惇安惇邢恕之罪特力時蔡京為翰林學士姦慝未著而瓘攻之益力曾布以給事中餌之瓘為書置袖中面布直發其過布怒箕踞誶語瓘色不變徐起曰所論國事是非自有定未可失待士禮布為改容明日出知秦州蔡京用又竄廉州又以子正彚談蔡京動搖東宫事安置越州方瓘之初在諫垣也以神宗實録皆紹聖史官據安石所修日録變亂是非不可傳後乃為尊堯録闢之京卞患其書行欲焚廢乃推石悈知台州悈視事之明日即遣校攝瓘陳獄具懾之瓘色不動厲聲曰今日之事豈被制旨耶悈失措曰有尚書省劄子請出示則取尊堯集繳申毁棄耳瓘曰若是則何爾且君知尊堯之所立名乎以神考為堯主上為舜何為詆誣時相寡學術悖而為此君所得幾何乃不畏公議犯名教乎悈大慙無以應卒不能奪也故讒諂之民比黨危身身可危志不可奪則劉安世陳瓘實有焉胡安國康侯初為大學録蔡京以同鄉欲牢籠之不得會舉遺逸安國舉布衣王繪鄧璋於是使吏訟二人皆范純仁門客流人鄒浩為請託坐除名靖康初除太常少卿趣召對上甚嚮信而耿南仲訾短之會中丞許翰見上問曰卿識胡安國未對曰未也然臣知其人自蔡京當國二十年天下士大夫無不受其籠絡超然逺迹惟安國一人帝喜除中書舍人既又為何栗馮獬所擯出知通州而金陷京師建炎初以給事中召又為黃潛善所尼既而天子益聞其名召除侍讀修春秋傳又為吕頥浩秦檜所惡排擊去而春秋傳卒行於世真德秀景元嘉定初為起居舍人時史彌逺方以爵祿縻天下士德秀慨然謂劉燔曰吾徒須亟去使廟堂之上亦知世有不肯為從官之人出為江東轉運副先都司胡槻薛拯以德秀迂儒試之事必敗而德秀治荒政發廩全活譽日起又以好名論之左遷歷泉州興隆潭州所在著聲理宗初以直學士召屢進讜言又為史彌逺所格嗾言者莫澤梁成大劾之落職奉祠久之彌逺死乃召參大政以大學衍義讀書記行於世故雖危起居竟伸其志胡安國真德秀有焉張九成子韶充經筵官講論甚有開發會議和九成事以禮部侍郎陳十事以操之秦檜謂曰公幸成檜此對曰九成豈敢異議顧朝廷不可苟安耳檜曰立朝須優遊委曲九成曰未有枉已而能直人者也於是檜目為趙鼎黨深問之九成入見上曰外議以臣為趙鼎黨即臣亦自疑上問故九成曰臣每見鼎聽其議論正直無滯坐不覺為久帝以語檜檜曰自古朋黨皆畏人知此人獨無畏坐罷奉祠尋以謗訕安置南安帝終念之嘗曰張九成安在檜曰頃以異議惑衆罷去此人終不為陛下用帝曰九成清貧不可無祿檜死乃復官當檜未死時靳人髙閌為司業帝幸太學講泰卦畢又問九成安在髙閌以奉祠對秦檜亦疑其薦引斥逐之寶慶初九成乃以明道議爵諡云蔡元定季通與朱元晦遊學禁作編管道州元定方宿元晦所聞之笑謂學者曰化性起偽烏得無罪不辭家就道諸友餞别蕭寺坐中有泣下者元定咨疑質是雍如也衆謂行宜緩自愛元定曰獲罪於天天可逃乎杖屨與子沈行三千里腳為流血無幾微見顔色至舂陵逺近來學者日衆或勸之謝生徒元定曰彼以學來何忍拒之誠有禍患亦非閉門塞竇所能免也卒以圖書厯律疇範著於世故雖危起居竟伸其志張九成蔡元定亦皆有焉范鎮景仁直諫院常引大體不以細過繩人論相執中無學術至執中家妾殺婢置之不論也以上春秋髙儲嗣未立勸上拔近屬以繫人心執政有難色鎮曰事當論是非不論難易如謂今日難於前日安知異日不難於今日乎凡見上流涕而陳者三章十九上待命百餘日鬚髮盡白也後定策立嗣實鎮首發之既自陳州召還為翰林學士知銀臺司數封還詔制與王安石忤上疏自劾極論安石用人之繆又言陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術疏入安石怒持其章為手顫自革制極詆之落翰林學士悉奪所得恩鎮表謝略曰願陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之蘇軾往賀曰公身雖退名益重矣鎮愀然曰君子言聽計從消患於未萌使天下陰受其賜無智名無勇功上也天下被其害而吾享其名獨何心哉吕誨獻可為殿中侍御史數論列大臣然未嘗暴揚人曖昧王安石甫執政士大夫多慶得人誨獨策其必禍天下疏論之道逢司馬光問今日所言何事誨曰袖中彈文乃新參也光愕然曰衆喜得人奈何論之誨曰君實亦為是言耶安石雖有時名然好執偏見輕信姦回喜人佞已聽其言則美施於用則疏置諸宰輔天下行受其禍光以未有顯迹勸置之不可誨乃論安石大姦似忠大詐似信合王衍盧把為一人由是斥外而安石果以恣睢敗光由是服誨之先見及誨病乞致仕猶懇懇以醫者用術乖方為諷卧病已劇光往候之諄諄言天下國家事目且瞑矣光呼之曰更有以見屬乎誨復張目曰天下事尚可為君實勉之故如范鎮吕誨者則可謂不忘百姓之病者矣魏徴問於文中子曰聖人有憂乎子曰天下皆憂吾得不憂乎問疑曰天下皆疑吾得不疑乎徴退謂董常曰樂天知命吾何憂窮理盡性吾何疑故如王通者可謂憂思者矣臣觀憂思諸儒不為利祿不為身家常存百姓之病下既嫌其激厲上又惡其沽名則比黨而危之者至矣是亦儒者之窮也寬裕章第十一儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮之以和為貴忠信之美優遊之法慕賢而容衆毁方而瓦合其寬裕有如此者敬者所以為直也義者所以為方也敬義立而德不孤不孤則可以大故和者所以為大也易曰直方大不習無不利則不疑其所行也學出於和行出於和通入於和困入於和儒有百行和一而已和非仁人則不能用也君子養中以致和博以居之篤以行之故剛毅特立豫備憂思而不犯衆之所忌以為寬裕之至也人君以是取其臣足保傅公孤之任也張安世張湯子也少以父任為郎用善書給事尚知書精力於職休沐未嘗出嘗亡書三篋詔問莫能惟安世議之後得書相較無遺失因推為尚書令昭帝即位霍公秉政上心憚之以安世篤行內倚為重御史大夫魏相言安世事武皇三十年忠信謹厚勤勞政事夙夜不怠與大將軍定䇿天下重臣也今新失大將軍請尊安世為大將軍輟光祿勳専念天下毋久空大位塞尊權帝欲從之事頗聞安世中自懼請問免冠頓首曰老臣耳妄聞言之為先事不言情不逹誠自量不足以居大位繼大將軍惟上裁察全老臣之命上笑曰君言太諫君而不可誰當可者安世深辭不能得竟拜大司馬衛將軍領尚書事自霍氏柄國丞相獨擁虛位為天下所指目安世念欲為天子重相權以謹密自周每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣不知其與議也故如張安世者可謂博學不窮篤行不倦幽居不淫上通而不困者矣韋玄成韋賢子也玄成既辭爵不得乃襲封宣帝髙其誼以為河南太守稍遷太常坐與楊憚厚免官及以列侯侍祀孝惠廟天雨淖不駕駟馬車而騎有司劾奏削為關內侯然玄成素謙遜好學不自尊貴遇知識步行下從者載送以為常既自傷貶黜父爵作詩甚刻厲後以淮陽中尉寖嚮用永光中代于定國為丞相復封故國又作詩自著復玷缺之囏難以戒示子孫漢興稱詩足繼三百篇則諫鄒赫矣於肅四篇為盛焉當永光時七廟數滿而郡國所立宗廟不稱經義乃議罷郡國廟及五廟四親之文又除衣冠出遊遵非適不配之制史稱其守正持重不及父賢而文采過之要如玄成辭爵恪慎謙抑自將不十年遂復父位以經學名世未為不守正持重也故博學篤行不淫不困韋玄成亦有焉王吉子陽好學明經舉孝廉為昌邑中尉昌邑王好遊獵動止亡節吉屢疏諫之王賀雖不遵道猶知敬禮吉及昭帝崩霍光迎立吉又為書戒王稱髙宗諒隂三年不言大王以喪事徴宜日夜哭泣悲哀慎勿有發且勸王垂拱南面以政事委大將軍王既即位以淫亂廢昌邑羣臣皆下獄誅惟吉與郎中令龔遂得滅死為城旦稍起為博士諫大夫時宣帝親政事頗尚綜核吉上書言期會簿書斷獄聽訟非大平之基勸上與公卿大臣宜一歸之於禮又言世俗婚娶太早尚主有違古義俗吏得任子弟非制尚方侈靡宜示天下以儉上以其言迂闊不甚寵異也吉遂謝病歸吉少時遊學長安東鄰有裘樹垂庭中吉婦取棗啖之吉遂去婦鄰人知欲伐樹因固請吉還婦里中語曰東家有樹王陽婦去東家棗完去婦復還其勵志如此故博學篤行不淫不困王吉亦有焉張湛子孝矜嚴好禮動止有常則居幽室必修容遇妻子如嚴賔在鄉黨詳言正色三輔以為儀表或議其詐湛笑曰詐善不亦善乎建武初為左馮翊修典禮設條教政化大行豫告歸平陵望寺門而步主簿進曰明府尊重不宜自輕湛曰禮下公門式路馬孔子於鄉黨恂恂如也父母之國當盡禮豈謂自輕哉拜光祿勳陳諫盡規多所匡益帝臨朝少有惰容輒獻警湛常乘白馬帝每見湛輒言白馬生且復諌矣及郭后廢乃稱疾不朝及大司徒戴涉誅起為大司徒自陳病篤遺溲朝堂免湛與伏湛皆名儒嘗事新室光武袚濯用之能自懋以顯故博學篤行不淫不困則張湛有焉卓茂子康為密令民嘗有言亭長受其米肉遺者茂曰亭長為從爾求乎為爾有事囑之而受乎抑平居自以思意賂之乎民曰往遺之耳茂曰遺之而受又何言民曰賢明之君使民不畏吏吏不取民今我畏之吏又取之故言耳茂曰爾為敝民矣凡人生所羣居不亂異於鳥獸者謂有禮義相敬事耳吏但不當強求何遽不宜受遺也民曰苟如此律何故禁之茂笑曰律設大法禮順人情今吾以禮教汝汝必無怨惡以律治汝汝何所措手足乎一門之內小者可論大者可殺也且歸念之魏霸喬卿濟陰人世有禮義少喪親兄弟同居州里慕其雍和和帝時為巨鹿太守掾吏有罪先之訓誨不改者乃罷免吏或相譖訴輒稱其他事之長以覆之譖訴遂息徴拜將作大匠時作順陵盛冬地凍中使督促數罰縣史以勵霸霸但勞來之曰天氣沍寒諸卿被辱皆大匠過也史皆懷恩力作加倍故禮之貴和卓茂魏霸嘗用之矣楊津北魏𢎞農人家世純厚兄弟八人並敦義讓至老津已六十有兄播椿相友愛不衰津事播如父及播卒椿與津並登台司而津旦暮參問羣子姪羅列階下椿不命坐津不敢坐椿近出不至津踰日昃還乃共食食則津親授匕著先嘗椿命食乃食己津出刺泗州椿在京邸四時嘉味因使附寄未寄不先入口椿得所寄輒對之泣下一家之內男女百口總麻同爨庭無問言椿垂老戒子孫曰國初好服綵色吾及見清河公恆布衣韋帶約敕諸父不興産求利不與勢家為婚至吾兄弟不能遵令汝等服乘漸於華好此吾等不如上世也吾兄弟家居不忍别食不異分財聞汝等頗有別齋獨食者此又不如吾世一等也大和初吾兄弟三人並忝二聖近臣居母子問相戒深慎侍禁中十餘年未嘗一言人過太后時噍責問之對曰臣等不敢以不審之言仰誤聖聽其後髙祖謂諸貴曰太后時吾每得杖撻由左右言是非者多惟楊播兄弟和吾母子真純臣也今聞汝等學時俗輕論人過見貴勝敬重見微賤易忽此人行之大失也故如楊津兄弟可謂以和為禮者矣江州陳氏者陳宜都王之後有伯宣者好學子崇為江州長史建家孰教子弟唐末旌為義門至宋初既十有三世矣長幼七百口每食必羣坐廣席未成人者别食少事長卑事尊不蓄婢僕供作使上下親睦家蓄犬百餘一犬不至羣犬為不食鄉里率化爭訟稀少宋初免其家徭後屬歲飢乏食知州唐戩為請歲貸粟二千石及後有陳旭者主家自白言今歲受貸粟之半可及秋遂止受半貸或云歲歉粟貴全受而糶可得贏餘旭曰朝廷以旭家羣從千口故貸以公粟豈因為利乎故如陳旭者可以語禮矣禮而後和和而後禮可立也髙允伯恭好文學忠信不欺崔浩之勒國史也魏主怒其暴國惡將行重誅太子左右之語允但委罪於浩允固不可魏主召問曰國書皆浩所為乎對曰太祖記前著作郎劉淵所為先帝記及今記臣與浩共為之然浩總裁而已至於著述臣多於浩魏主謂太子曰允罪重於浩何以得生太子懼以述亂為請魏主再問之允以質對且曰太子欲生臣臣實不迷亂魏主默然久之顧太子曰此人情所難臨死不易辭信也為臣不欺君貞也詔特原之已命允為詔誅浩及僚屬僮吏百二十人皆族允持不上趣之急允又請對曰浩所坐更有他釁非臣敢知如直以觸犯罪不至死魏主怒命介士執允并戮之太子為且拜且請乃獲免亦僅族浩餘誅止其身遊雅曰喜怒者人生所不能無也子與髙子遊處四十年未嘗見其喜怒之色崔司徒嘗謂髙生豐才博學所乏者矯矯風節耳及司徒得譴詔旨切責聲嘶股戰不能措一辭髙子敷陳事理申釋是非辭義清辨非謂矯矯者乎文宗愛任勢威震四海王公以下望庭奔拜髙子獨升階長揖誰風節如之故如髙允者則可謂忠信之美優遊之法者矣當時齊有崔暹者邢邵每道其短暹每道其長名位相近而髙子深逺矣許衡平仲少時避亂暑中過河陽道旁有梨衆取啖之衡危坐不動或問之曰非其有而取之非義也人曰世亂無主衡曰梨無主吾心無主乎自是博覽經傳下及百家靡不研究久之從姚樞處得程朱書讀之有契遂移家蘇門從姚樞居取前所得簡帙悉焚之與子書曰小學四書吾敬之若神明信之若師保能明此書他書雖不治可也後以姚樞薦召提京兆學風化大行世祖即位召拜國子祭酒謝病歸至元二年復召至命議事中書省四年復請歸五年復召不定官制時阿哈瑪特擅權橫放大臣阿附之衡正色懾會命其子簽書密院事衡曰國家事權兵民財三者而已今其父典民與財子又典兵可乎上曰卿慮阿哈瑪特反耶衡曰由其道亦可以反耳因論其専權罔上蠧政害民諸事又謝病歸八年以集賢殿大學士召守國子監祭酒衡喜曰此吾事也時所選子弟皆幼稚衡設誠教之課誦稍暇即習禮習射投壺書算嘗云教人與用人異用人當用所長教人當教所短由是學者日改月化程朱之學明於北方許衡之力也許衡仕進在夷惠之間然其志在明道淑人故忠信之美優遊之法衡亦有焉公孫𢎞淄川人少為獄吏罪免牧豕海上四十餘乃學春秋雜説六十以賢良徵為博士使胸奴還報不合上怒以為不能移病免歸元光間復徵賢良文學國人固推之對制䇿太常奏居下天子擢為舉首容貌甚麗又髙自況譬至云周公旦治天下期年而變三年而化五年而定惟陛下所志天子至問𢎞自視孰與周公賢𢎞云搡曲木者不纍日銷金石者不纍月人性不相逺期年而變臣𢎞尚竊遲之上異其言時方通西南夷巴蜀苦之使𢎞視焉還盛毁其無用上不聽每朝會議開陳其端使上自擇不肯面折廷諍上察其行慎厚辨論有餘習文法吏事緣飾以經術甚悅之一歲中至左內史嘗與公卿約議至上前皆背約以順丄旨汲黯廷詰其懷詐不忠𢎞謝曰知臣者以臣為忠不知臣者以臣為不忠上然其言𢎞為人談笑多聞常稱為人主病不廣大為人臣病不節儉時又東置滄海北築朔方𢎞數諫以為罷敝中國以奉無用之地使朱買臣難置朔方之便發十策𢎞不得一乃謝曰臣山東鄙人不知其便願罷滄海西南夷専事朔方汲黯一日詰𢎞曰𢎞位在三公而布被此詐也𢎞謝曰有之管仲相齊有三歸侈擬於君桓公亦霸晏嬰相齊食不重肉下比於民齊國亦治臣患未能比於晏嬰耳且無黯陛下安聞此言上愈益賢之於是代薛澤為丞相封平津侯𢎞自見為舉首起徒步數年至丞相封侯於是起客館開東閣以延賢人身食一肉飯脫粟俸入以給故人賔客及後數傳東閣客館皆為馬廏車庫矣故慕賢而容衆毁方而瓦合公孫𢎞有焉匡衡稚圭父世農夫至衡好學精力絶人傭作以供資用射策不應補平原文學東海人共追宗之蕭望之梁丘賀已貴皆從衡問詩元帝為皇太子聞衡説大善之及即位以史髙薦召為郎中問政治得失衡言朝有變色之言則下有爭閭之患上有自専之主則下有不讓之臣上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民其大意歸於禮讓上悅其言遷光祿大夫大子少傅時帝好文詞頗改宣帝之政而優遊寬容進用猥多又傅昭儀及子定陶王愛幸衡乃言先帝制度未可變更宜遵制揚功以定羣下之心又言審好惡理性情可畢王道聖王必慎妃后之際別適長之位慎防其端禁於未然皆關切時務上以為任公卿遷光祿勳御史大夫已代韋玄成為丞相封樂安侯成帝即位上疏戒妃匹勸經學言關雎為王化之原六經者聖人所以統天地之心語尢精梓中於時事上敬納其言既與御史大夫甄談共奏石顯舊惡並諸黨與司隸校尉王尊劾衡談居大位知顯等専擅不以時自發而阿諛曲從反歸過先帝罪至不道有詔勿劾衡以此屢謝病乞骸骨卒以封田越界事廢免衡之毁方未有若張禹孔光之甚也然於石顯用事時實不能匡敕於早故慕賢而容衆毁方而兀合匡衡亦有焉狄仁傑懷英則天時已為同平章事既與任知古裴行本等同被告密下來俊臣治先是俊臣請敕一問即承者得減死俊臣以是誘之仁傑即署狀曰大周革命萬物維新唐室舊臣止欠一死反是實俊臣乃少寬之仁傑得裂帛潛書寃狀遣子告變太后意動乃召見仁傑等問曰承反何也對曰脫不承已死於考掠矣曰何為作謝死表對曰無之出表乃知其詐由是得釋久之后以誅殺多稍厭李昭德金安藏等亦時有巽心之言后又髙年稍尊信仁傑仁傑乃從容以姑姪母子啓諭后又時與張昌宗兄弟周旋勸召還大子一日后召廬陵王還匿之帳中召仁傑語上事仁傑語益切至涕下不自禁后乃出王見之曰還爾太子仁傑起再拜賀且曰太子歸外未有知者人言紛紛何所信后乃令太子舍濯龍門負儀仗迎復宫中外大悅武承嗣怏怏病死先是后問將相之才於仁傑仁傑薦張柬之及仁傑薨柬之卒誅二張復中宗之位仁傑委蛇晨牝之際不能潔身忍辱多而見功晚然其事機難為道不宜遽故慕賢而容衆毁方而瓦合狄仁傑有焉王旦子明景德中麥知政事時契丹信急上駕幸澶州留守雍王遇暴疾乃留旦居守旦對上曰願宣寇準至臣有所請準至旦曰十日間未有捷報也當如何帝默然良久曰立皇太子旦頓首幸甚馳抵京不過家即宿直禁庭以王命參決中外莫知其為旦也至駕還郊迎乃知之他所處契丹丐幣德明求糧皆中於廟算及薦逹朝士咸莫之知也李行簡以將作丞家居遷太子中允使者不知其宅上命就中書問之乃知為旦所薦曹瑋自秦州還命李及代衆疑違其才旦獨以為可用之果效時寇凖已家居旦薦之復召知樞密時談旦短上語旦曰卿常稱準美準常談卿過何也旦曰理固當然臣當路久缺失必多準對陛下無所隱益見其賢及凖罷遣人從旦求使相旦驚曰將相之任豈可求耶準大憾之已而除準同平章事武勝軍節使準見上謝帝具道旦所以薦者準始愧歎以為不如也凡旦前後薦可為大臣者十餘人惟李及凌策不至相位及旦病篤問可付後事者旦曰知臣莫若君再三問乃強舉笏曰莫如冦準故慕賢而容衆毁方而瓦合王旦亦有焉旦以天書封禪事恆悒悒自慊從諛也遺命為緇流以斂亦可謂毁方瓦合者矣臣觀寬裕諸臣皆盛豫之器上下所喜必本於傳學篤行不淫不困則是可儒也舉賢章第十二儒有內稱不辟親外舉不辟怨程功積事推賢而進逹之不望其報君得其志苟利國家不求富貴其舉賢援能有如此者君子遺其親而後可事其君遺其家而後可謀其國謂營身而可以事君營家而可以謀國吾不信也大臣自為富貴則賢能之人不用賢能之人不用則士失其報君失其志朝多貪鄙而事功並墜矣人君以是取臣則賢路不塞髙位不濫禮讓興而權賄止也楚令尹虞丘子復於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位才之所不著無當其處臣為令尹十年矣國不加治獄訟不息處士不升久踐髙位妨羣賢路臣之罪當稽於理臣竊選國俊下里之士曰孫叔敖秀羸多能其性無欲君舉而授之政則國可使治民可使附莊王曰子輔寡人寡人得以長於中國令行於絶域又何求焉虞丘子曰久固祿位者貪也不進賢逹能者誣也不讓以位者不廉也有三者則不忠不忠則無以事君莊王從之賜虞丘子采地三百號曰國老以叔敖為令尹少焉虞丘子家干法孫叔敖執而戮之虞丘子入見於王曰孫叔敖之果可使也奉國法而不黨施刑戮而不骫可謂公矣莊王曰是夫子之賜也故如虞丘子可稱曰儒矣楚莊王聽朝罷晏樊姬下堂而迎之曰王得無飢倦乎莊王曰飽於聽忠賢之言也樊姬曰王之所謂忠賢諸侯之客歟抑中國之士歟王曰沈令尹也燓姬掩口而笑王曰何也姬曰妾得於王尚湯沐執巾櫛振袵席十有一年矣然妾未嘗不遣人之梁鄭之間求美人而進之王也與妾同列者十人賢於妾者二人妾豈不欲擅王之寵哉不敢以私願蔽衆美欲王之多見則娛今令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王旦朝以樊姬之言告沈令尹令尹避席而進孫叔敖叔敖治楚三年而楚國霸楚史載之曰楚之霸樊姬之力也故如樊姬賢於虞丘矣秦穆公徵鹽於虞人虞人以百里奚將車公觀鹽牛車之下見其牛肥問百里奚曰任重致逺而牛何肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也令有司沐浴為衣冠與坐問所以肥國者公大悅異日見公孫支公孫支曰君其得聖人乎君之聰明思慮類得聖人也公曰然吾見百里奚類聖人也公孫支歸見百里奚取雁以賀曰君得社稷之臣敢賀社稷之福公不辭再拜而受明日公孫支乃致上卿以讓百里奚公不許公孫支曰君不用賔相而得社稷之臣君之祿也臣見賢而讓之臣之祿也今君既得其祿矣而使臣失祿可乎請終致之公不許公孫支曰臣不肖而處上位是君失倫也進賢退不肖君之明也終處髙位廢君之德安上失倫逆臣之行臣請逃公乃受之以百里奚為上卿而公孫支副之故如公孫支可謂儒者矣齊將軍田瞶出將張生往送之告曰昔者堯讓許繇天下洗耳而不受將軍知之乎曰唯然知之伯夷叔齊辭諸侯而不為將軍知之乎曰唯然知之於陵仲子辭三公而為人灌園將軍知之乎曰唯然知之知過去君弟變姓名為庶人將軍知之乎曰唯然知之孫叔敖三去相而不悔將軍知之乎曰唯然知之此五大夫者而在則不送將軍矣今將軍合一國之權提師十萬擅斧鉞之權慎毋以所知傲所不知者也田瞶曰唯受教矣夫是則猶未及於舉士也而舉士之意具焉推其意也可以不辟趙宣子言韓獻子於晉侯曰其為人不黨治衆不亂臨死不恐晉侯以為中軍尉河曲之役趙宣子之車干行獻子戮其僕人皆曰韓獻子不終矣其主朝升之而暮戮其僕誰能待之役罷趙宣子觴大夫爵三行曰二三子可以賀我二三子曰不知所賀宣子曰我言韓厥於君言之而不當必受其刑今吾車失次而戮之僕可謂不黨矣是吾言當也二三子再拜曰夫子之言不惟晉國賴之唐叔實享之其先有祁大夫請老問嗣焉稱解狐其讐也將立之而卒又問對曰午也可於是羊舌職死矣晉侯曰孰可代對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚能舉善矣稱其讐不為諂立其子不為比舉其偏不為黨其先有舅犯者文公問舅犯曰誰可使為西河守者舅犯曰虞子羔可也公曰非汝之讐耶對曰君問可為守者非問臣之讐也羔見舅犯而謝之曰幸赦臣之過又薦之於朝舅犯曰薦子者公也怨之者私也吾不以私事害公義子去矣顧吾射子也故趙宣子之學於祁奚猶祁奚之學於舅犯也內舉不辟親外舉不辟讐則三大夫皆有焉管仲言於齊桓公曰夫墾田創邑闢土植穀盡地之利則臣不如寧戚請置以為田官登降揖讓進退間習臣不如隰朋請置以為大行蚤入晏出犯君顔色進諫必忠不重富貴不避死亡則臣不如束郭牙請置以為諫臣決獄折中不誣無罪不虐無辜則臣不如弦寧請置以為大理平原廣囿車不結軌士不旋踵鼓之而三軍之士視死若歸則臣不如王子成甫請置以為大司馬君如欲治國強兵則五子者在矣如欲霸王則夷吾在此故程功積事推賢而進則管夷吾有焉田忌去齊奔楚楚王郊迎至舍問曰楚萬乘之國齊亦萬乘之國也常欲相并奈何對曰易知耳齊使申孺將則楚發五萬人使上將軍將之至馘首而反耳齊使田居將則楚發二十萬人使上將軍將之分別而相去也齊使盼子將則楚發四封之內王自出將而忌從相國上將軍為左右司馬如是則王僅得全耳於是齊使申孺將楚發五萬人上將軍至擒馘而反於是齊王忿然更使盼子至楚悉出四封之內王自出將田忌從相國上將軍為左右司馬益王屬車九乘僅得免耳至舍王北面正領齊袪問曰先生何知之審也田忌曰此易知耳申孺為人侮賢者而輕不肖俱不為用是以亡也田居為人尊賢者而賤不肖賢者負任不肖者退是以分别而相去也盼子之為人也尊賢者而愛不肖俱負任是以王僅得全耳田忌之言則未至於推賢也然以一將之賢絀萬乘之敵故萬乘之富不如一士之貴也子路問於孔子曰治國何如孔子曰在於尊賢而賤不肖子路曰范中行氏尊賢而賤不肖其亡何也曰范中行氏尊賢而不能用也賤不肖而不能去也賢者知其不己用而怨之不肖者知其賤己而讐之賢者怨之不肖者讐之怨讐並前雖欲無亡得乎君子推賢不營報施不解讐怨曰利於君國而為之雖如田忌之言未逺於道也孔子間居喟然而歎曰銅鞮伯華而無死天下其有定矣子路曰願聞其為人也孔子曰其幼也敏而好學其壯也有勇而不屈其老也有道而能以下人子路曰其幼也敏而好學則可其壯也有勇而不屈則可夫有道又誰下哉孔子曰由也不知吾聞之以衆攻寡無不消也以貴下賤無不得也周公制天下之政而下士七十人豈無道哉不能下士則不能推賢不能推賢則君子畔棄而小人慢亂介之推行年十五而相荆仲尼聞之使人往視還曰廊下有二十五俊士堂上有二十五老人仲尼曰合二十五人之智智於神合二十五人之力力於彭祖以相萬乘其免己乎故推賢而進逹銅鞮伯華介之推有焉楚令尹卒景公謂成公乾曰令尹將安歸成公乾曰殆於屈春乎景公怒曰吾資何少於屈春乎成公乾曰義獲天下之至憂也而子以為友鳴鶴芻狗其知甚少而子玩之鴟夷子皮日侍於屈春損頗為友二人者智足以為令尹不敢専其智而委之屈春故曰其歸之屈春乎魏文侯將置相置於季成子與翟黃翟黃謂李克曰君問相於先生誰屬者李克曰其季成子乎翟黃不悅李克曰君問相於我對曰君視之矣貴視其所舉富視其所與窮視其所不為貧視其所不取君曰先生出矣寡人之相定矣以是知其為季成子也翟黃曰觸之所舉多矣昔者西河無守吾舉吳起鄴無令吾舉西門豹酸棗不治吾舉北門可王欲攻中山吾舉樂羊王欲使治之臣吾舉先生欲傅太子吾舉屈侯附觸何負於季成子李克曰季成子食祿千鍾什九居外是以束得卜子夏田子方段干木三人者君皆師之子之所舉皆臣之耳於是翟黃自愧失對他日見段干木道其故段干木曰進賢之難也子之六舉者皆賢季子為相子終其次也夫李克之言則猶有未盡也季子之進賢也不望報而翟黃望報也齊威王遊於瑤臺成侯卿來車從甚都王望之謂左右曰國至貧也何出之盛也左右曰與人者有以責之受人者有以易之王試問其説俄而成侯卿至謁曰忌也來王不應如是者三王徐曰以國之貧也何出之盛也成侯曰死罪幸赦之得言其説是忌之舉賢也是王之用人也昔者忌舉田居子為西河而秦梁弱舉田解子為南城而楚人抱綺羅而朝舉黔涿子為冥州而燕人給牲趙人給盛舉田種首為即墨而於齊足究舉刁勃子為大士而民益富九族益舉此數良人者王安枕卧耳何患貧哉夫成侯卿舉賢則為富貴也晏子則不為富貴者也晏子與繚遊十餘年景公欲從而見之晏子曰臣聞為地者不能成王為祿仕者不能成政髙繚與嬰為兄弟久矣未嘗干嬰之過補嬰之闕特仕進之臣何足以補君晏子之言是矣不為望報不為富貴而惜乎晏子之未有所舉也晏子之晉見披裘負芻息於途者以為君子也使人問之曰是越石甫也齊人纍之晏子曰噫解左驂贖之載與歸不辭而入越石甫請絶焉晏子使人應之曰嬰未得交也而免子於患猶為罪乎越石甫曰吾聞士絀於不知已而仲於知己者歸而不辭是以請絶也晏子乃出謝之曰向也見客之容今也見客之意嬰聞察實者不留聲觀行者不幾辭嬰可以辭而無棄乎以是尊之以為上客夫以為人才不及晏子耳何晏子之未有所舉也淳于髠侍于宣王與之論好曰古者好馬王亦好馬古者好味王亦好味古者好色王亦好色古者好士王獨不好士宣王曰國無士耳有則寡人亦好之矣淳于髠曰古者驊騮騏驥今無有王選於衆亦好馬矣古者豹象之胎今無有王選於衆亦好味矣古者有毛牆西施今無有王選於衆亦好色矣王必待堯舜禹湯之士而後好之則禹湯之士亦不好王矣故晏子猶未有與於推賢也孔子謂宓子賤曰子治單父而衆説語我所以治之者曰不齊父其父子其子恤諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友者十一人孔子曰父事三人可以教孝矣兄事五人可以教弟矣友十一人可以教學矣中節也中民附矣猶未足也曰此地有賢於不齊者五人不齊事之教不齊所以教之術孔子曰欲其大者乃在於此矣昔者堯舜清微其身以觀聽天下務來賢人夫舉賢者百福之宗也神明之主也不齊之所治者小也不齊之所治者大其與堯舜繼矣夫子賤亦未嘗推賢而逹之也然其道有大於推賢者曰有利於國家晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削縫賔胥無善純緣桓公知衣而已亦其臣之力也師曠侍曰臣請譬之以五味管仲善斷割隰朋善煎熬賔胥無善齊和羮以熟矣奉而進之而君不御誰能強之亦君之力也夫管仲諸賢則猶求富貴也然其道有進於富貴曰使君得其志趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎相連曰富之則可貴之則否烈侯曰然有鄭歌者槍石二人可與之田萬畝居久不與烈侯又命與之知相連未有以易也番吾君謂相連曰君實好善而未所持今公相趙四年亦有所進士乎曰未也番吾君曰牛畜荀欣徐越此三人者皆足以移君所好矣相連乃進是三人者明日牛畜侍道以仁義約以王道明日荀欣侍教以選綀任官使能明日徐越侍教以節財儉用察度功德使國無不充烈侯乃謂相國曰歌者之田且止矣益其祿以官三人故如相連可謂使君得志不求富貴者矣晉文公田於虢遇一叟問焉曰虢之為虢久矣子處此聞虢亡其有説乎叟對曰虢君斷則不能諫則無與也不能斷又自謂賢是以亡也文公輟田歸遇趙衰而告之趙衰曰其人安在公曰未與之來也趙衰仰首而歎曰哀哉古之君子聽其言則用其人今之君子聽其言則棄其身故晉國之推賢者莫如趙衰也或論趙衰與舅犯之賢也有士欲達於文公因舅犯終歲不逹因趙衰三日而逹之故晉國之推賢者莫如趙衰也晉平公過九原而歎曰嗟乎此地之藴吾良臣多矣若使死者起也吾誰與歸乎叔向對曰其趙武乎平公曰子黨於子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出於口然其身舉士於白屋之下者四十六人皆得其意而君賴其利及文子之死也四十六人皆就賔位故晉國之推賢者莫文子若也漢末邑仲卿舒人也以治行入為大司農惇厚公直不可交以私膠東相張敞與之書曰明主遊心太古廣延茂士此誠忠臣竭思之時也敞逺守劇郡馭於繩墨胸臆約結固無竒耳即有亦安所施足下以清明之德掌周稷之業猶飢者甘糟粳穰歲餘梁肉有無之勢異也昔陳平雖賢須魏倩而後進韓信雖竒賴蕭公而後信故事因時各逹英雄如必伊尹吕望而後薦之則此人不因足下而進矣邑感其言始薦達賢士大夫朝廷多得其助焉昔子貢問於夫子曰春秋之大夫孰為賢也夫子曰其鮑叔子皮乎子貢曰抑其管仲子産也夫子曰吾聞鮑叔之薦管仲子皮之薦子産至於管仲子産則未有所舉也故舉賢推能則惟鮑叔子皮有焉臣觀舉賢之説春秋尚之後世以權歸於上外避朋黨而隂固爵祿是或一道也任舉章第十三儒有聞善以相告也見善以相示也爵位相先也患難相死也久相待也逺相致也其任舉有如此者任舉之事人主之所惡也然不任舉則人臣無以事其君通者相讓任者相助有善相引有過相規名位相讓功過共事久而不渝逺而不疑故朋友之誼正而後君臣之道備使為人臣者自私其身聞見違人利祿與已得則據之不任一人不舉一事上諛其君下悅妻子此則傭𨽻之所治也儒者以善公之人以賢分之友以爵祿公之天下人君以是取臣則朋黨之疑消彚征之途闢也方春秋時列國卿士相與善者有吳季子鄭子産晉叔向范宣子季札過鄭子産貽之縞帶季子報以紵衣宴就學焉病就宿焉語執政而必歸之禮也子産之鑄刑書叔向以書告之曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有爭心也是故間之以義糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從猶懼其未也故誨之以忠使之以和涖之以強斷之以剛猶求聖哲之士忠信之長慈惠之師民於是可任使也不生禍亂民知有辟則不忌於上並有爭心以徴於書微幸而成之不可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書欲以靖民不亦難乎詩曰儀式刑文土之典日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端則將棄禮而徴之書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂矣子産復之書曰若吾子之言僑不才不能及逺吾以救世也既不承命敢忘大惠及范宣子聽晉政諸侯之幣重子産寓書於子西以告宣子曰子為晉國不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難諸侯之賄聚於公室則諸侯二若吾子賴之則晉國二諸侯二則晉國壞晉國二則子之家壞何沒沒也夫令名德之輿也德國家之基也有基無壞無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也上帝臨汝無二爾心有令名也恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子實生我而謂浚我以生乎象有齒以焚其身賄也宣子悅乃輕幣故如叔向子産則可謂聞善相告見善相示者矣被廬之搜晉始作三軍謀元帥於趙衰趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也君其試之乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之命趙衰為卿讓於欒枝先軫佐之荀林父御戎魏犨為右郤縠卒先軫將中軍胥臣佐下軍上德也及後狐毛卒使趙衰代之辭曰城濮之役先且居之佐軍也善軍伐有賞善其君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥嬰先都在乃使先且居將上軍公曰趙衰三讓其所讓皆社稷之衛也以趙衰之故搜于清源作五軍趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之晉諸君子於是多讓也故爵位相先則趙衰狐偃諸賢之謂夫夷之搜時先軫已沒于秦師趙成子欒貞子霍伯臼季皆卒矣公欲使箕鄭父先都將上軍士穀梁益耳將中軍先克曰狐趙之勳不可廢也使狐射姑將中軍趙盾佐之綿上之搜則范丐為政故晉人三搜而卿大夫之名著於天下爵位相先之謂也宣王之末年王政始衰杜伯驟諫王欲殺之左儒不可王遂殺之左儒曰臣而失言於君不忠失情於友不信遂死之蓋自是周無諍臣也荀林父之敗歸而請死晉侯欲許之士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未艾也困獸猶鬭況國相乎及楚殺子玉而後喜可知也曰莫余毒也己是晉再克而楚再敗也今天或者大警晉也而又殺林父以重楚勝何以競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之於是晉侯使復其位叔孫豹會諸侯于虢而季孫宿伐莒取鄆莒人告于會曰尋盟未退而魯伐莒瀆齊盟矣請戮其使於是趙文子求貨於叔孫弗與梁其脛曰貨以藩身子何愛焉叔孫豹曰諸侯之會衛社稷也我以貨免魯必受師是禍之也雖怨季孫魯國何罪叔出季處有自來矣吾又誰怨晉人猶請乃裂裳帛而與之趙孟聞之曰臨患不忘國忠也思難不越官信也圖國忘死貞也有是三者又可戮乎乃為請於楚而舍之故爵位相先患難相死士貞子叔孫豹有焉建武中徴范升為博士范升讓曰臣與博士梁恭山陽守吕羌俱修梁丘易二臣年並耆艾經學深明臣不及也而不以時退與恭並立知羌學又不能引逹誠慙負無以立於世夫誦而不行知而不言不可以為人師願推博士以避恭羌上不許而愈嘉其賢後升為出婁所告出繫論死楊政以箭貫耳抱升子伏道旁草間望駕至持章叩頭白升寃且曰升三娶僅一子今適三歲孤之可哀虎賁懼驚乘輿引弓射不退旄頭創之傷胸又不退上為下尺一出升詔理官曰乞楊生師故如范升楊政可謂爵位相先患難相死者矣自是而後志節之士浸習成風然非仁人不能也鍾興嘗受公羊春秋於丁恭興以授皇太子諸王得封關內侯引拜興前謝曰臣無功不敢受爵上曰生教訓太子諸王明先聖之道非功而何對曰臣經受之師丁恭臣適傳誦耳於是詔封恭歐陽尚書尚書博士缺上欲用桓榮榮叩頭讓曰臣經術淺薄不如同門生郎中彭閎揚州從事睪凱上不許乃拜榮為博士引閎為議郎當建武中豫章何陽以選明經授太子書上從容問若本師誰也曰臣師沛國桓榮上即召榮問尚書大善之曰得生幾晚當時司徒歙坐汝南度田不實論死諸生守闕求哀者千餘人至有自髠剔者平原禮震十七自繫求代死而歙已瘐死獄中於是掾陳元上書追理得賜印綬贈賻焉及後黨錮禍發李固杜喬先死非命有詔暴尸敢臨者族固弟子汝南郭湸年甫成童左持章奏右貫鈇鑕乞收葬不許乃往臨哭前陳辭與南陽董班守固喪不去太后聞而不誅會喬故掾楊匡聞喬死號泣星行至洛著故赤幘為門亭史守護尸驅蠅蚊積十二日乃要鈇鑕詣闕請收骸太后許焉蓋是時重經師氣節相勵故爵位相先患難相死則東漢諸賢盛於春秋矣廉范叔度永平初隴西太守鄧融辟為功曹會融為刺史所案當得重譴欲以權相濟託病去融大恨之范東至洛變姓名為廷尉獄卒居亡何融果繫獄范侍衛左右甚勞苦融怪其為范而殊不意謂之曰卿何似我廉功曹范詭之曰君困眩瞀耶融繫久疾病范隨養視竟融死不言身自將車送喪至南陽葬畢乃去後辟公府所受學師薛漢坐楚獄誅衆莫敗視范往斂收之帝召入詰責范叩頭曰臣愚無狀以為漢已伏誅亦足示國法矣誠不忍師資之情罪當坐帝以其詞直壯之問曰若豈廉頗後耶與右將軍褒大司馬丹有屬乎對曰褒臣曾祖丹臣祖也帝曰怪卿膽志乃爾知是也以為雲中守其後有戴就者為郡倉曹掾太守成公浮坐誣贓罪部從事薛安按之收就下獄使證太守備五毒不易辭又燒鋘斧使就挾於肘腋就語獄卒熾之勿冷也每上彭考因止飯食掇體中焦肉墜者自啖食之又覆船下薰以馬通以大針刺指中卒不肯服安乃呼謂之曰太守罪穢狼籍卿何故以骨肉相扞就對曰太守剖符大臣以死報國卿雖銜命宜申斷寃毒奈何誣枉忠良強相掠理令臣謗其君子證其父乎安竒其節乃解械更與美談表釋其事故廉范而降至於戴就亦可謂患難相死者矣當戴就時有繆肜仕縣為主簿縣令被章見考諸吏皆畏懼自誣彤獨證據其事掠考備至體生蟲蛆更换五獄踰涉四年令卒以免隴西梁湛召為決曹史湛病卒彤送還隴西會西羌亂湛家皆避去他郡彤獨留不去為起墳冡潛穿土窟晝伏夜作及賊平而墳已立是皆未至於中道也而激勵名節為難能雖通儒無譏焉漢魏而後士怵於死黨之誽蓋自杜衆與李雲並誅而廷無危論又自陳容與臧洪俱死而世少安瀾至於孫丞斷踝以明二陸劉濂結衣以從其兄南北人才雕墜盡矣唐宋之薦舉與晉魏之表讓半為空名其悃愊推遜惟婁師德盧懷慎有足稱焉師德稱戰為將有邊功而黽勉受唾以承垢師德嘗薦狄仁傑可宰相仁傑不知也數短之武后謂仁傑曰師德賢乎仁傑曰師德往為將謹守著勞賢則不知也又問師德知人乎仁傑曰臣與共事久未見其知人后曰朕知卿乃師德所薦也亦可謂知人矣出其奏示之仁傑慙出而太息曰婁公盛德包容我久我終不能測其涯際矣盧懷慎以清儉聞不營産業得祿賜遂散於故人親戚輒盡及在大位自以才不及姚崇每事皆推崇久之以疾乞骸又薦宋璟李傑李朝隱盧從願既屬疾宋璟盧從願往候之見敝簀單席門不具帷箔會風雨至舉席自障日晏食蒸豆二器酒數杯別己執二人手曰上求治業倦勤將有憸人乘間而進者公等志之其逺慮如此武后時嘗問仁傑曰朕要一好人任使有乎仁傑對曰何所用之武后曰使為將相耳仁傑曰料陛下若求文章資歷則今之李嶠蘇味道足矣豈非文士齷齪思得大才用之以成天下之務乎武后悅曰是也仁傑曰荆州長史張柬之其人雖老真宰相才也且久不遇若用之必盡忠於國家后即徵為洛州司馬他日又求賢仁傑曰臣前言張柬之未用也后曰已遷之矣仁傑曰臣以為可相非可為司馬乃遷秋官侍郎及姚崇將赴靈武后又令舉內外可為宰相者崇曰張東之沈厚有謀能斷大事且其人年老惟陛下亟用之即時召見為同鳳閣侍郎平章事故如婁師德盧懷慎狄仁傑姚崇者可謂知所任舉者矣唐時天子猶留意於人才如常何之於馬周張循憲之於張嘉貞皆發一策核一事奮迹天衢之上最後稱李吉甫之納裴垍取筆疏列二十餘人數日之內拔用殆盡然互有短長不臻於純儒宋時稱吕蒙正聖功為相孜孜以薦引人才為先務每四方官吏請謁必問其所在人才姓名行事去輒疏記藏素袋中有一人數見稱引輒先用故在位朝列咸稱得人真宗束封行過洛即其家省之引見諸子問誰可用者對曰臣諸子皆駑不足用有姪夷簡任潁州推官宰相才也客有富言者白見其子請得侍太祝學許之既見大驚曰此兒他日名位與吾埓而勳望過之敕諸子禮貌則鄭公弼也嘗問諸子曰我為相外議云何對曰大人居位甚稱但外人頗云無能蒙正笑曰我信無能但有一能能用人耳其後有虞允文彬甫初在郎署為秦檜所擯不用既與相康伯有舊亦不相往來乾道初始以陳俊卿薦參大政尋出撫蜀已復召為相嘗稱宰相以人才為要務每以人才列為三等有聞見輒記之號館才録次第舉用其所甄薦如洪適汪應辰胡銓周必大王十朋趙汝愚李燾之倫皆一時名賢又舉梁克家自代遂與併相允文生於衰朝以采石之勳動主知不能與前宋比績而其薦名士抑金使薦朱熹識器邁於時賢故任舉之道吕蒙正虞允文有焉史魚數薦蘧伯玉於靈公靈公曰諾其後未用史魚入曰臣聞抱玉入庭不如貢賢夫國危者則思安安國以人思人以賢君何疑焉靈公未之信也以謂史魚庭褒虛飾良久乃應之火魚出謂其子曰昔禽息碎首以薦百里奚吾則未能也今言伯玉於公而公不信則不如死也將自殺以明之曰我死勿斂用伯玉乃斂靈公聞之曰痛哉寡人徒以史魚謙退欲進士也而不意其信如此也是寡人之罪也乃拜伯玉而後哭史魚也伯玉使於楚逢公子晢濮水之上接草而待曰聞上士可以託色中士可以託詞下士可以託財三言者固可得託乎伯玉曰謹受命伯玉見楚王使事畢從容言士王曰何國最多士伯玉曰惟楚多士而楚不能用王曰何也伯玉曰子胥生於楚而吳善用之賁皇生於楚而晉善用之今者臣之來逢子哲濮水之上是將使吳用之乎使晉用之乎於是楚王發使者追子晳於濮水之上是非伯玉之言而楚先臣之言也由其道亦可以久逺故久相待逺相致則史魚蘧伯玉有焉臣觀任舉之事回遹易生漢人救以連坐其弊愈滋要以儒術相資不為黨耳特立獨行章第十四儒有澡身而浴德陳言而伏靜而正之上弗知也粗而翹之又不急為也不臨深而為髙不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者道在天下德在一身専而治之以為靜公而與之以為正言者不得已而鳴之也急於知則有智名急於為則有勇功臨深為髙非勇也加少為多非智也以為可為而輕為之則與世同治以為不可為而不為則與世同亂異同在於世是非正於己易曰上火下澤暌君子以同而異火之與澤皆靜也或上或下皆正也火不臨深澤不加多二女異志不言而分行故謂之暌易曰澤滅木大過君子以獨立不懼遁世無兊者少也巽者長也兌陳而巽伏少女將外長女在內則必有取之者矣失是不取過不在我故謂之大過君子之在同而異獨立不懼則取之此也人臣以是事君則怨惡少而禍譴不至也魯有周豐者哀公執贄請見之不可公使人問焉曰民有虞氏未施信于民而民信夏后氏未施敬於民而敬敢問何施而得此於民也豐對曰君不察乎墟墓之問未施哀於民而民哀宗廟社稷之中未施敬於民而民敬殷人作誓而民始畔周人作會而民始疑苟無禮義忠信誠慤之心以涖之雖固結之民其有不解乎是非周豐之言而夫子之言也哀公問孔子曰寡人生乎深宫之中長乎婦人之手寡人未嘗知哀也未嘗知憂也未嘗知勞也未嘗知懼也未嘗知危也孔子辟席曰吾君之問乃聖君之問也丘小人也何足以言之哀公曰微吾子吾無所聞之矣孔子就席曰然君入廟門升自阼階仰見榱桷俯見几筵其器存其人亡君以此思哀則哀安不至矣君昧爽櫛冠平旦聽朝一物不應亂之端也以此思憂則憂安不至矣君平旦聽朝日昃而退諸侯之子孫必有在君之門廷者以此思勞則勞將安不至矣君出魯之四門以望魯之四郊亡國之墟列可數也以此思懼則懼安不至矣丘聞之君者舟也庶人水也水以載舟亦以覆舟以此思危則危妥不至矣夫執國之柄履民之上凛乎以朽索馭奔馬易曰履虎尾詩曰如履薄氷危之至也周豐之言蓋本於此故澡身浴德陳言而伏靜而正之則周豐有焉桓公田至於麥丘見丈人焉問曰子年幾何矣曰八十有三公曰美哉夀乎子以夀祝寡人麥丘丈人曰祝主君使主君甚夀金玉是賤人民是寶桓公曰善哉至德不孤善言必再麥丘丈人曰祝主君使主君無羞學無恥下問賢者在側誎者得人桓公曰善哉至德不孤善言必三麥丘丈人曰祝主君使主君無得罪於羣臣百姓桓公怫然曰此一言者非夫前二言之匹也請更之丈人再拜而起曰君熟思之此一言者前二言之長也臣聞子得罪於父可因姑姊妹以謝也臣得罪於君可因左右以謝也昔者夏桀殷受得罪於羣臣百姓莫為謝者至今不赦公曰善扶而載之自御以歸夫麥丘之言甚似夫祝鳬已疵之言也桓公踐位令釁社塞禱祝鳬已疵獻胙焉祝曰使除君之苛疾與君之多虛而少實桓公不悅瞋目而視祝鳬巳疵又授酒更祝之曰使去君之多虛少實又與君之若賢桓公怒將誅之以告管仲管仲曰是善祝也君不自賢則受胙永年故麥丘丈人祝鳬已疵亦可謂陳言而伏靜而正者矣魏文侯見箕季其牆壞而不築文侯曰何為不築對曰不時其牆枉而不端問曰何為不端曰固然從者掇園之桃箕季禁之少焉日晏進疏糲之食瓜瓠之羹文侯出其僕曰君亦無得於箕季矣文侯曰何謂無得於季也吾一見季而得四焉牆壞不築云待時者教我無奪農時也牆枉不端云固然者教我無侵封疆也園不掇桃豈愛桃哉教我下無侵上也食我以糲羹豈不能具五味哉教我無多斂以省飲食之養也甚矣箕季之似子罕也士尹池為楚使於宋子罕享之宿子罕之舍南家有牆擁於前而直西家之潦經其宫而不止士尹池問之子罕曰南家挽工也徙之曰吾待挽而食三世矣今徙則邦之求挽者不知吾處也吾將不食是以不徙西家髙吾宫卑潦之經吾宫也利何可禁也士尹池歸謂楚人曰宋不可攻也其君賢其相仁賢者得民仁者能用人故子罕與箕季可謂靜而正之上弗知者矣魏文侯則可謂知也晏子之宅近市而湫隘景公命更之辭曰君之先臣所容焉臣不足以嗣之於臣侈矣且小人近市朝夕得求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰踊貴屨賤蓋時繫刑鬻踊者多公聞之為之省刑及晏子如晉公更其宅反則成矣既拜而毀之謂里人曰非宅是卜惟鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥因陳桓子以請乃復其舊甚矣晏子之言似管子也桓公觀於廏問廏吏曰廏何事最難廏吏未對管仲對曰夷吾嘗為圉人矣傳馬棧最難先傳曲木曲木又求曲木則曲木已傳直木無所施矣先傳直木直木又求直木則直木己傳曲木亦無所施矣如管仲晏子之言則所謂靜而正之上不知者矣張釋之從文帝登虎圈帝問上林尉禽獸簿十餘問不能對虎圈嗇夫從旁代對甚悉文帝曰吏不當如是耶尉無賴召釋之拜嗇夫上林令釋之久之前曰陛下以絳侯周勃何如人帝曰長省也又問東陽侯張相如何如人帝復曰長者釋之曰夫絳侯東陽侯稱長者此兩人言事曽不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆吏亟疾苛察相髙無惻隱之實以故不聞其過今陛下以嗇夫口辨超遷之臣恐天下風靡不可不察也於是拜釋之公車令太子與梁王入朝不下司馬門釋之劾之太后使使赦太子梁王乃得入故如釋之者非急為粗翹者也汲黯為主爵都尉武帝對汲黯言治云吾欲云云汲黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎帝默然變色罷朝或訾黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎張湯滅定律令黯於帝前質責之曰湯為正卿上不褒先帝之功業下不能化天下之邪心安國富民使囹圄空虛何乃取髙皇帝約束紛更之為也至乃罵曰天下謂刀筆吏不可為公卿果然如汲黯則可謂粗翹者矣然觀其斥公孫𢎞揖衛青諌殺近臣正廟樂章何其靜而正也張釋之從帝出中渭橋有人從橋下出走驚乘輿馬使騎捕屬廷尉釋之訊無他比犯蹕當罰金上怒曰此人親驚吾馬吾馬賴和桑不敗安得輕比釋之曰法者天子所與天下共也今法如此而更重之是法不信於民也其後有人盜髙廟座前玉環捕得下廷尉當棄市上大怒曰人無道乃至盜先帝廟器吾欲致之族而君以法奏之非所以共承宗廟也釋之免冠頓首曰法如是足也今盜廟器而族有如萬一愚民取長陵一抔土將何以加其法乎上白太后乃許廷尉是故如釋之則可謂靜正者矣當汲黯時渾邪王率衆來降漢發軍二萬乘迎之縣官無錢從民貰馬民或匿馬不具上怒欲斬長安令黯進曰長安令無罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷弊中國以事夷狄之人乎帝默然及渾邪王至賈人與市者生當死五百餘黯請見髙門曰夫胸奴攻當路塞絶和親中國興兵誅之死傷糜費不可勝計臣以為陛下得胡人皆以為奴婢賜從軍死事之家所鹵獲因子之以謝天下塞百姓之心今既不能又虛府庫賞賜發良民侍養若奉驕子愚民何知市買長安中物而文吏繩以為闌出財物如邊關陛下縱不能得胸奴之資以謝天下又以微文殺無知者五百餘人是所謂庇其葉而傷其枝也由是而觀則是汲黯之靜正汲黯之不急為也鮑永君長司隸校尉宣子也事更始繫青犢有功封中陽侯光武即位徴之不至知更始亡乃發喪封上將軍列侯印綬幅巾詣河陽謁帝帝問永卿衆安在永辟席稽首曰臣事更始不能安全誠慙以其衆幸富貴悉罷之矣帝曰卿言大而意不悅時攻懷未拔拜諫大夫謂之曰關東素畏卿卿可將故人詣城下曉譬竟降之還賜洛陽里第謝不受又為司隸校尉劾趙王良不敬朝廷肅然時扶風鮑恢亦抗直不避強禦帝所謂貴賤斂手以避二鮑者也永行縣道經更始墓下引車入陌前趨拜從事止之永曰寧有親北面事人而過墓不拜者乎竟下拜盡哀去至扶風椎牛上苟諫冡帝意頗不平張湛進曰仁者行之宗忠者義之至仁不遺親忠不忘君思之薦也帝意乃釋故不臨深為髙不加少為多鮑永有焉史弼公謙少篤學辟公府遷北軍中候劾渤海王險僻乞露章宣示帝以至親不忍下其事也遷尚書出為平原相時詔舉鉤黨郡國所奏連至數百弼獨無所上詔書前後切責從事案問曰朝廷疾惡黨人旨意懇惻青州六郡其黨有五近國甘陵分南北部平原何理而得獨無弼曰先王疆理天下畫界分境水土異齊風俗敻異他郡自有平原自無何可相比若承望上司誣陷善民濫刑以逞則平原之人户可為黨相有死耳所不能也從事大怒即收郡僚下獄為章劾弼會黨禁解得贖免既當舉孝庶中常侍侯覽遣諸生齎書請之并求假鹽稅弼收付安邑獄遂考殺之覽因誣弼誹謗檻車徴下廷尉平原吏人奔走詣闕訟之前孝廉魏劭毁變形服為家僮護弼弼遂受誣當棄市劭與同郡人賣郡邸以賂覽得減死輸作故不臨深為髙不加少為多史弼有焉皇甫規威明當西羌叛時冦三輔規方年少策將軍馬賢必敗既而果然乃上書自請討羌不許沖質間舉賢良方正對策論大將軍冀河南尹不疑為權貴所惡自免歸冀誅拜泰山太守會諸羌復叛復自請討羌詔以為中郎將持節監關西兵討零吾破之諸羌慕義降者十餘萬諸中貴又共誣陷之乃上疏自訟曰臣前糾李翕等五臣五臣支黨半國中交構豪門競流謗讟云臣私結諸羌酬以金錢若臣私財則家無擔石如出官物則文簿可稽就臣愚惑審如人言能賂羣羌令來降者前世尚賂胸奴以宫姬鎮烏孫以公主臣以私財桑服叛羌何罪之有自永初來將出覆軍者五動費巨億有旋車完封寫之權門而名成功立厚加封爵今臣還督本土絶交離親衆謗陰害固其宜也乃得徴還竟輸作左較後復拜度遼將軍以送客越境及附黨自劾不報如皇甫規者雖粗翹亦可謂世治不輕世亂不阻者矣蓋勳元固為漢陽長史與從事蘇正和有仇及正和案武威太守罪權貴恨之刺史梁鵠欲殺正和以為解勳力保全之正和詣謝勳亦不見也後刺史左昌盜軍資十萬苦勳數諫遂與勳别屯及為賊所圍勳亟還救之而免後救夏育於畜官兵少為羌所敗身被三創不動羌滇吾者知勳曰蓋長史賢人殺之為負天下與之馬勳叱死不肯上羣羌服其義乃送還漢陽及董卓廢少帝不道勳質責之曰昔伊霍權以立功猶可寒心足下何以終此賀者在門弔者在廬矣卓心憚之是時公卿而下見卓皆不敢仰視惟勳與亢禮會司隸校尉缺王允欲推勳卓曰此人明智有餘不可假以雄職乃以為越騎校尉一日朱雋詣卓卓忽怒曰我百戰百克皆決於心卿勿妄言汚我刀勳正色曰昔武王明聖猶求針諌況如卿者而欲杜天下之口乎故如蓋勳亦可謂世治不輕世亂不沮同弗與異弗非者矣用世之士特立獨行宜其難也出世之士皆非異己者見阻於亂世臨深為髙收聲而伏隱約而已矣夷考其行澡身浴德不輕不沮捐同異泯髙多動靜合宜有裨於世道其惟黃憲仇香管寧陳實鍾皓邴原諸君稱焉間見諸篇故不復陳也臣觀特立之儒不以陳言自見間亦有之必以草野粗翹見譏故聖人特著之於此規為章第十五儒有上不臣天子下不事諸侯慎靜而尚寬強毅以與人博學以知服近文章砥厲廉隅雖分國如錙銖不臣不仕其規為有如此者天子無不仕之臣則有豢畜臣下之心儒者有仕宦之心則其規為賤於奴隸矣慎靜尚寬強毅與人博學知服亷隅文章此四者皆大臣之器也然非其道義不臣不事孟子曰達可行之天下而後行之達不可行之天下而行之則其規為有不足觀者矣易曰嘉遁貞吉以正志也肥遁無不利無所疑也正志則干祿者知愧無疑則終遁者不悔火在于山天用其明澤在于山天用其清二者嘉肥之藪也天子以是取其臣故頑貪絀而先王之道舉也建武初物色嚴光久之未得也後齊國有得之釣澤者三聘乃至上即日幸其館光卧不起上即光所撫光腹曰咄咄子陵獨不可相助為理乎又卧不應良久乃張目熟視曰昔唐堯著德巢父洗耳士固有志何相迫乎帝曰子陵我竟不能下汝耶升輿歎息去司徒侯霸遣吏奉書前迓光光發書竟謂吏曰君房素癡今為三公寧小差否吏對曰位已鼎足不癡也光曰遣卿來何言吏述霸言屈相顧也光笑曰是非癡而何吏求報乃投劄口授之曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順旨要領絶吏求益光笑曰買菜乎求益也霸得書封奏之帝笑曰狂奴故態也帝每引光入道舊故相對纍日從容問光曰朕何如昔時對曰陛下差增於往除諫議大夫不屈耕於富春山以終其後順帝時有樊英者通五經善風角河洛七緯推災異輒效隱壺山之陽前後徴辟皆不至乃備玄纁切責州郡趣駕上道至京復稱疾不起強輿入殿不為禮上怒謂英曰朕能生君能殺君能富君能貧君君何為慢朕英曰臣受命於天生盡其命天也死不得其命亦天也陛下安能生臣安能殺臣臣見暴君如仇讐立其朝猶不肯況得而貴之乎布衣環堵之中晏然自得雖萬乘不易又得而賤之乎臣非禮之服萬鍾不受伸其志雖簞食不厭陛下又安能富臣貧臣哉帝不能屈而重其名髙為設壇場供几杖待以師傳之禮數月稱疾篤以光祿大夫賜告歸井丹大春通五經善談論京師謂曰五經紛綸井大春建武末五王居北宫皆好賔客更請丹不能致信陽侯陰就以外戚貴寵詭説五王求錢千萬約當致丹而别遣人劫之丹不得已至就故為設麥飯蔥葉之食丹推去之曰君侯不能供甘旨安用饌先生乎俄而左右進輦丹笑曰吾聞桀駕人車豈謂此耶坐中皆失色就不得已去輦自是隱閉不關人事以夀終臺佟字孝威隱武安山鑿穴為居采藥自給建初中州辟不就刺史執贄見之謂佟曰孝威居身甚苦如何佟曰佟幸得保全性命存神養和何苦之有如明使君奉宣詔書日夕怵惕庶事乃為苦耳遂去終隱不見如嚴光樊英井丹臺佟者亦可謂不臣不事者矣慎靜尚寬強毅與人博學知服砥厲文章或未之兼舉也韓康伯休采藥名山賣以自給口不二價者三十年有女子從買藥康守價不移女子怒曰若豈韓伯休耶乃不二價乎康歎曰本欲逃名而為市中女子所知何用隱為乃遁入霸陵山中使者奉詔造康強之康不得已辭安車自乘柴車往亭長方修道奉徴君而康柴車至亭長奪其牛既乃知其徵君也使者欲治奪牛罪康曰自老子與之何罪既即路乃從車後逃去龎德公居峴山之南未嘗至城府夫婦相莊如賔獨與襄陽司馬徽善一日渡沔上冢未反徽至徑入呼德公妻作黍云徐元直當來俄而德公與元直至不知孰主客也劉表數延請不能致乃就見之龎公釋耕壟上妻子耘於前表問曰士全一身孰與全天下乎龎公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所息趣舍亦人之巢穴也各得所棲息而已故慎靜尚寬強毅與人則韓康龎德公有焉張霸嘗云人生一世但當畏敬於人人不善加已直為受之豈顧報哉用是道亦可以入世其後有孫登公和者於汲郡北山為土窟居焉夏編草為裳冬散髮自覆好讀易撫一絃琴見者皆親樂之人或擠之水中觀其怒獨出水顧笑而已魏文使阮籍詣之箕踞相對籍談笑終日登一無所應嵇康從之遊三年乃誠其保曜全年見其寢處惟竹實數斛杵臼一具而已夏統仲御者會稽人也事母孝每采梠求食星行夜歸或勸之試仕統作色曰諸君之遇我至此耶使統屬太平之時當與元凱敷謨賡歌過濁代當與屈生同汙共泥汙隆之際自與沮溺耦耕豈有辱身降志州郡之下耶以母疾詣洛市藥會上已王公遊洛車騎如雲統曝藥了不一顧賈充怪問之因為談風土上下大禹泰伯曹娥伍胥之事慷慨刺舟而去故慎靜尚寬強毅與人則孫登夏統有焉皇甫謐曰貧者士之常賤者道之實處常得實沒齒不憂生不為人所知死不為人所惜至矣介之推曰身既隱矣安用文之然而文卒不廢於巖谷張臶子明遊太學兼通內外後歸里袁紹屢辟皆不應移居上黨再遁常山太和中詔求隱學之士通消復災異者郡纍上以病老不行廣平太守盧育到官三日綱紀白承前致版謁謝不敢但遣主簿奉書致禮而已青龍中張掖元川溢寶石負圖臶見之以為將來之徴正始中戴鵀巢於門隂臶謂門人曰戴鵀陽鳥也而巢於門隂此凶羊也援琴歌之旬日卒凡百有五歲戴逵安道少博學善屬文不樂當世以琴書自娛太宰武陵王晞召鼓琴逵對使者破琴曰戴安道豈王門伶人哉徙會稽剡山性髙潔以禮度自將深以放逹為非嘗著論曰儒家尚譽本以興賢也既失其本則容貌相欺至於末偽道家去名欲以篤實也既失其本則情禮俱虧至於末薄非二木之失而弊者託二本以自縱也夫道有常經而弊無定情苟乖其本聖賢亦如之何哉故如張臶戴逵者可謂博學知服近文章砥厲廉隅者矣沈麟士武康人博通經史有髙尚之心執喪盡禮居貧手織簾口誦書嘗織作誤傷手而泣或云此不足痛何泣也曰傷不痛但毁遺體而悲耳或有認其所著屐者麟士曰是卿屐耶笑而與之已送屐還謝前誤麟士曰非卿屐耶笑而受之元嘉末以抄書至都下歷觀四部畢乃歎曰古人何人希之則是耳遂歸隱吳差山或勸之仕答曰魚懸獸檻天下一契聖人前悟所以吉先誠未能景行坐忘奈何不希企日損乎吳興守張永欲請為功曹麟士笑曰君欲飾渾沌以蛾眉冠越客以文冕僕寧蹤東海不受此黥劓也故如沈麟士可謂博學知服者矣阮孝緒陳留人以不樂為從父後既冠之後嘗欲迹赤松於灜海追許繇於穹谷父喪不服綿纊即茹蔬有味輒吐之外兄王晏既貴孝緒避不見嘗食醬而美問之從晏所得也遂覆醬及晏誅親戚交為之危孝緒曰親而不黨何懼竟獲免嘗入鍾山母驟病兄弟趣召之母曰孝緒行至矣果心動而反世傳母病須參孝緒從鹿行得參者也毋沒後遂絶交遊惟劉歊兄弟時一造見之梁兵圉建業樵蘇不宿僮婢樵鄰墓以繼火孝緒聞之不食終日故博學而知服近文章砥厲廉隅沈麟士阮孝緒有焉孝緒初撰髙隱傳上自黃炎下迄天監分為三品以言行超逸姓氏弗傳為上始終不撓姓名可録次之挂冠人世棲心塵表又次之凡百三十七人以示劉歊劉訐歊謂昔嵇康為贊缺一自擬今四十之數將俟吾輩成之耶孝緒笑曰荀君雖少後事當付鍾君若素車白馬之日當獲麟于二子矣歊訐果前卒孝緒益為二傳及孝緒卒訐兄潔録其行次篇末故如孝緒可謂博學以知服者矣孝緒之先有孔淳之雷次宗朱百年褚伯玉之流皆湛泉石自處在文質之間其文學砥厲者有顧歡元平世寒素為農夫歡貧無從受業嘗詣鄉學倚壁聽誦夕燃松節讀書聞東遷邵元之通五經遂假傭書從之受業母亡水漿不入口者六日廬於墓卒喪遂隱於天台山每日出户山鳥皆就其掌取食同時有山隂孔佑隱四明山嘗于山谷中見錢數百斛視之與瓦石無異嘗有鹿中箭來投佑佑為拔箭日飼之飼愈乃去故近文章砥厲廉隅顧歡孔佑亦有焉蓋自阮孝緒而後巖谷溷于緇黃巢許篡于道釋隱居之士幾絶閭巷伏處者其於髙隱無稱焉齊宣王召田過而問焉曰君與父孰重田過曰父重王忿然曰曷為士去親而事君也對曰非君之土地無以處吾親非君之祿無以養吾親非君之爵無以尊顯吾親受之於君致之於親凡事君以為親也宣王悒然無以應之若是則不及事其親者不宜仕於君也漢有周磐者汝南人治古文尚書洪範五行左氏傳言行為諸儒所宗居貧養母儉薄不充讀詩至汝墳之卒章慨然歎始就孝廉之舉和帝初令三邑有惠政以母老棄官母卒毁頓廬墓教授常千人公府三辟有道慨然曰吾親沒矣從物役何為遂不應辟有何琦者廬江人少孤居陽谷事母孜孜色養患甘鮮不贍吏以養及母喪泣血杖而後能起殯而火匍匐撫棺哭天為反風服闋慨然曰嚮所為出身仕者微祿飬親也今無恃怙復仕何為於是恬淡養性耽玩典籍終老不交人事故如周磐何琦者親沒之後不臣不仕雖分國之半猶如鎘銖也故親沒之後而猶且仕者宜天子之所賤也田饒事哀公三年而不見察乃請于公曰臣將去此而黃鵠舉矣哀公曰何謂也曰君不見夫雞乎戴冠文也傅距武也敢鬭勇也得食相告仁也守夜不失時信也雞有此五德君猶日瀹而食之何也以其從來近也黃鵠一舉千里止君園池食君魚鱉啄君梁黍無彼五德君猶貴之以其所從來逺也今臣將去君而雲鵠舉矣然則慎靜強毅博服廉隅不見察于君則不宜臣仕也桓帝嘗徴薑肱不至乃下彭城使畫工圖其形狀可謂見察矣而薑肱不出靈帝踐阼陳竇見誅曹節思致天下名賢以弭己謗于是聘薑肱為犍為太守薑肱慨然曰吾以虛獲實徒長聲價盛明之際尚不委質況政在私家哉遂浮海去莫知所之延篤叔堅嘗為侍中帝數問政事婉辭密對可謂見察矣李公又稱其有王佐之才而延篤款款安於將廢之命消搖內階詠詩南軒願沒牖下以見父祖故如薑肱延篤者或臣不臣或仕不仕要其規為有以自處也故人臣事君不見察于君而猶且臣且仕者亦明天子之所惡也交友章第十六儒有合志同方營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者合志同方非為比也營道同術非為黨也並立則樂故能和相下不厭故能讓久不相見聞流言不信故志有終而道相濟也本天者圓本地者方方而後能立立而後能行行而後義起馬立義同而進不同而退故進不為利退不為害也同人之離先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭聖人之貴同也如此故同義者君子之事同利者小人之道也人主不知利義但曰惡同故小人讒險以敗善類人主惡同君子尚獨而旅進者進易退者退上下蹲沓無與事君詩曰民有肅心荓云不逮又曰自有肺腸俾民卒狂天子以此察臣故和衷可致而讒諂不作也少昊髙陽氏娶鄒屠氏之女分姓九人曰駱明蒼舒隤敳檮戭大臨龎降庭堅仲容叔逹駱明長自為族蒼舒而下所謂八愷也皆能率少昊之德齊聖廣淵明允篤誠舜實舉之使布五教于四方父義母慈兄友弟恭子孝內平外成此八愷者非其性殊皆服少昊之教志同道同故其趣舍進退亦同也帝嚳髙辛氏娶娵訾氏之女分姓九人曰摯伯奮仲堪叔獻季沖伯虎仲熊叔豹季貍摯自為族伯奮而下所謂八元也皆能率帝嚳之德忠肅恭懿宣慈惠和舜實舉之使主后土以揆百事莫不時序地平天成此八元者非其性殊皆服帝嚳之教志同道同故其趣舍進退亦同也帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦渾敦者北方之獸無官竅自為淫樂者也少皥氏有不才子毀信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒窮竒者西方之獸遇姦回則負戴飲食遇忠信仁義之人則搏之噬之顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常天下之民謂之檮杌檮杌者東方之獸人面虎足喜鬭不退者也縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭天下之民以比三凶謂之叨餮叨餮者南方之獸飲食無極者也此四凶者非有殊性為不率先王之教畔堯舜之化隂懷異志凶德相比欲竊聖明之祿位與元凱親為仇敵者也故合志同方營道同術元凱有馬元凱而後民獻十夫繼之者希矣垂隴之會鄭伯享趙孟焉子展伯有子西子産子太叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之奔奔趙孟曰牀第之言不踰閾非使人所得聞也子西賦黍苗之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾子之惠也印段賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈趙孟曰匪交匪敖福將焉往保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎叔向曰然已侈不及五稔文子曰其餘皆數世之主也故六穆者合志而營道也伯有敗類而卒以戮其喪志之謂歟韓起之聘鄭也鄭六卿餞之於郊韓宣子曰二三子諧皆賦也亦以知鄭志子齹賦野有蔓草宣子曰孺子善哉吾有望矣子産賦羔裘宣子曰起不堪也子太叔賦褰裳宣子曰起在此敢動子至於他人乎子太叔拜宣子曰善哉子之言是不有是事其能終乎子遊賦風雨子旗賦有女同車子柳賦蘀兮宣子喜曰鄭其庶乎二三子以君命貺起賦不出鄭志皆昵燕好也二三子數世之主也可以無患矣宣子皆獻馬馬而賦我將子産拜使五卿皆拜曰吾子靖亂敢不拜德故合志同方營道同術六穆而後五卿有焉齊侯田晏子侍於遄臺子猶馳而造焉公謂晏子曰惟據與我和夫晏子對曰據亦同也安得為和公曰和與同異乎對曰和如羮馬水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁大小長短疾徐哀樂剛柔遲速髙下出入周旋以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是夫天下之不同者可否可同者志也道也志同而通道同而謀猶之和羮而鬼同享和聲而神同聽之也故子猶之於晏子所謂合不同方營不同術者也當漢初時如蕭曹張季馮分汲黯鄭當時杜延年于定國黃霸龔遂張安世金日磾皆志同方而道同術也鄭當時行不純儒墓長者惟恐不見誡門下客無貴賤無留門者執賔主之禮性庶不治産奉賜以給賔客每朝候帝問説未嘗不言天下長者其推轂士及官屬丞史常引以為賢於己未嘗名吏與臣屬聞人言如恐傷之也至於張安世而密矣安世嘗有所薦引其人來謝安世大恨以為舉賢逹能豈有私謝耶絶弗與通有郎功髙不調來自言安世曰君功髙明主所知人臣執事何所短長而自言乎絶不許而郎遷莫府長史遷去辭之官安世問以過失長火曰將軍為明主股肱而無所薦士論者頗以為譏安世曰明主在上賢不肖較然臣下自修而已何與薦士其匿名迹逺權勢如此杜延年為大將軍故吏大將軍光持法嚴延年輔之以寬會桑𢎞羊以反誅其子遷亡過父故史侯史吳大將軍欲坐史吳匿反者罪丞相千秋屢言之不聽丞相乃召二千石博士議史吳法大將軍怒且及丞相延年乃奏記光言吏縱罪人有常法今更詆吳恐於法已深又丞相素無守持為好言於下其素也擅召二千石雖甚無狀然及先帝時用事非有大故未可棄其後丞相千秋死子為洛陽武庫令而魏相方守河南治郡嚴丞相子自免去相私自恨曰殆矣大將軍聞此必謂我因丞相死薄其子也已而果然故魏相之用法亦猶與杜延年同術也于定國之為廷尉人以方之張釋之嘗念居平處大事當依經義而自傷淺學乃迎師受春秋身執經北面備弟子禮經術士雖卑賤徒步往過定國皆與鈞禮其決獄平法務在哀鰥寡釋疑滯致慎重之意及後黃霸為廷尉正數決疑獄廷中稱平遷丞相長史坐長信少府夏侯勝非毁詔書不舉劾繫獄因從勝受尚書獄中積三幾乃出故杜延年于定國營道同術而又與魏相黃霸合志同方也黃霸外寬內明習文法溫良有讓用潁川起至丞相人以為不及丙魏于定國功名損於治郡時蓋其時治法嚴痛繩羣下俗吏相歐霸有所不樂故黃霸之損乃所以為益也方張安世時為光祿勳郎有醉溺殿上者主事白行法安世曰何知其不反水漿耶郎汚官婢婢兄自言安世曰奴以恚怒衊衣冠署責之其隱人過類此及丙吉為相掾吏有贓罪不稱職輒與長休告終無所案驗或謂吉曰君侯為相姦吏得成其私然無所懲艾吉曰以三公之府有案吏之名吾竊鄙焉故不為也有馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車上吏曹白斥之吉曰是不過汚我車茵耳以醉飽之過斥士令此人何以自容則是與安世同術也凡前漢士多大體為長者髙行至京兆郡守乃激發要於有為其志趣畢睹矣武昭而後丙吉最為長者魏相之相則丙吉引致之丙吉疾篤上自臨視問曰君即不諱誰可代者吉辭謝白羣臣行能明主所自知臣愚無所識上固問頓首曰西河太守杜延年明國家法度習故事廷尉于定國執憲詳明天下自為不寃太僕陳萬年養後母孝惇厚備於行止三人行能皆在臣右惟上察之後三人者居位皆稱有盛名故並立則樂相下不厭丙定侯有焉當顯宗時有鍾離意第五倫魯恭皆志道相同施歷三世而後名節之士並立相下近於名髙激以宦寺而茅茹誼喪矣意當永平間為尚書司農上簿有誤字帝怒召郎笞之意入叩頭曰過誤人所時有若以為罪臣位髙罪重郎位小罪輕臣當坐乃解衣就格帝意解貰郎又言百姓可以德勝難以巧服先王有至德要道民用和睦故能致天下和平災害不生禍亂不作鹿鳴之詩必言燕樂者以人神之心洽然後天氣和也願詔有司慎人命緩刑罰順時氣以調隂陽帝頗采納焉肅宗時天子厭吏治苛刻下寬大之令倫亦言臣嘗讀書記知秦以酷急亡國王莽亦以苛政自殘光武承王芥之餘頗尚嚴猛後代因之遂成風俗不可得反郡國所舉類多辦職俗吏未有寬博之選以應上求宜申明其制自太守以下拜除自京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者但可報罷不宜加以喜怒以明在寬魯恭本魏相之意推明隂陽易十二月君子議獄緩死則亦與意倫同術也意倫亦寡所薦士惟恭所辟選髙第至列卿郡守數十人而門下耆生或不蒙薦舉有怨望者恭聞之但曰學之不講是吾憂也如魯恭非為苟同者矣羊祜叔子九世清德郭奕嘗比之顔子纍中書侍郎典樞要有違覆輒焚草所薦達朝士人無知者或謂其慎密已過祜曰君未三復於不密之誡乎吾懼其不及也及在荆襄墾田塞險與吳為鄰時鼎足已成進趣未定不欲以疆場起爭始與吳人戰必尅日不為掩襲有進譎詐之策者必飲以醇酒每出畋遊獵必止晉地獲禽皆分界護還之陸抗嘗病祜饋之藥抗立服之左右交諫抗曰豈有鴆人羊叔子哉及吳主戾虐祜始發平吳之策又曰取吳不必臣行但既平之後當勞聖慮耳中朝初欲以祜為儀同三司祜表讓曰今光祿李喜秉節髙亮在公正色光祿魯芝潔身寡欲和而不同光祿李胤清亮簡素正身在朝皆服事華髮以禮終始雖厯外內之寵不異寒賤之家而猶未蒙此選臣何以塞天下之望又封南城郡侯祜引留侯辭十萬户事謝之故晉臣之稱和粹者必曰羊祜如羊祜可謂並立則樂相下不厭者矣魏舒陽元少不為鄉望所知常著韋衣入山澤以漁獵為事匆一日自課百日習一經輒登第稍遷為尚書郎時欲汰郎官非才者舒即持襆被而出曰吾其人也後將軍鍾育每與參佐射舒為長史常與畫籌後遇朋不足命舒充之舒容範間雅發無不中舉坐愕然莫有敵者育謝而歎曰吾之不足以盡卿才有如此射矣山濤沒舒領司徒所得祿賜皆散之九族時有陳留周震不利公辟世稱為殺公椽舒竟辟之無患也年將及舒輒以老病遜位辭讓敦切司空衛瓘與之書曰每與足下共論此事日日未果可謂瞻之在前匆焉在後矣故並立則樂相下不厭魏舒亦有焉朱勃叔陽年十二能誦詩書衣方領行矩步馬援裁知書見而愧之援兄況謂援曰朱勃速成智盡此耳卒當從汝稟學勿畏也既而朱勃未二十已試渭城宰及援為將軍封侯勃位不過縣令以故舊往來時聞卑侮之言不問也及援遭薏苡之謗惟勃上書白焉章帝初詔故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讐無德不報其以縣見穀二千斛賜勃子若孫勿令詣闕謝故如朱勃所謂久不相見聞流言不信者矣參軍張裔以武侯委意岑述內不平至交怨武侯與書曰君昔在柏下柏下城壞吾食不知味後流道南海吾寢不安席今付大任自以為古之石交石交之道舉讎以相益割肉以相明終不相卻也況吾但委意元倫而君曾不能居忍耶張裔聞之以是愧服魏將軍張遼與護軍武周有隙後求交於吳質吳質辭之遼一日遇質就之曰僕托溫承委意於君何以相孤如此吳質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雄士往者將軍稱之不輟口今以睚眥之恨反成嫌隙況質才薄豈終好是以不願也遼感其言復與周平故聞流言不信武侯吳質有焉當其時許泛以豪氣而詆陳登先主獨信其文武膽智造次難比雍丘以袁曹而疑臧子張超獨信其天下義士敦本能來是雖武健仗俠亦有儒者之一端焉其先有霤義仲公舉茂才推讓於陳重閔貢含菽水盟心於周黨又有扶風太守引令長為拜母之交同邑前賢託妻子於後來之彥如梁統之於孔奮張堪之於朱暉或交臂杵臼之間或分手傭舂之外皆本方立義道同而進不同而退使明主見之不敢疑其黨小人值之不敢行其謗無他其道信於同其志信於獨也臣觀書稱一德一心又稱同心同德人主惡同亦於義利辨之耳立義同則方術無不同者儒者不言方術而言志義術圓而義方內方謂之君子內圓謂之小人和同之間辨之此耳尊讓章第十七溫良者仁之本也敬慎者仁之地也寬裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼此而有之猶且不敢言仁也其尊讓有如此者儒者之務至於仁而止矣仁以盡人事發人理達人情以為人子為人臣為人弟視天下之人道無不可尊讓也而又獨尊讓仁者猶曰是天命之畎畝而王故嚴毅别察中有之而不敢用也曰吾積和敬以漸通於禮樂如此而已矣天下而有仁人者出將體五德以君臨天下則吾勉強從事焉易曰和順於道德而理於義蓋謂此也詩曰仲山甫之德柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦儒者有是八德以從事於仁則若天子賦明命庶乎其可矣人臣以是事其君則克導凝承庶常吉士之任也書易皆稱九德禮樂兼言六行其専言仁者斷自孔門為始其要歸於仁者則儒行其至矣儒行所舉十六行事皆動足經世存為人師而終之曰猶且不言仁也與論語所論由求赤陳文子諸人同意子曰中心好仁者天下一人而已好仁尚難而況於仁者乎曾子曰君子以仁為尊天下之富何富則仁富也天下之貴何貴則仁貴也昔者舜匹夫也土地之厚得而有之人徒之衆得而使之惟仁以得之也伯夷叔齊死於溝澮之間成名於天下非有土地爵祿之藉也言為文章行為裘綴於天下故君子思仁晝則忘食夜則忘寐日旦自省以役其身亦可謂守業矣孟子尊爵安宅之説出於此江都易王問董仲舒曰粵王句踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人亦以為粵有三仁也何如仲舒對曰昔者魯君問柳下惠曰吾欲代齊如何柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問耳猶且羞之況設詐以欺人國乎由此言之粵未嘗有一仁也夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺童子蘆稱五霸為其先詐力而後仁義也孔子見客客去顔淵曰客仁也乎孔子曰恨兮其心顙兮其口仁則吾不知也言之所聚也顔淵蹙然變色曰良玉度尺雖有十仞之土不能掩其光良珠度寸雖有百仞之水不能掩其瑩夫形體也色心也閔閔乎其薄也苟有溫良在其中則眉睫與之矣瑕疵在其中則眉睫不能匿之故曰溫良者仁之本也曾子有疾曾元抱首曾華抱足曾子曰吾無顔氏之仁也何以告汝夫華多實少者天也言多行少者人也飛鳥以山為卑而層巢其巔魚鱉以淵為淺而穿穴其中然所以得者餌也君子苟能無以利害身則辱安從至乎官怠於有成病加於少愈禍生於懈惰孝衰於妻子察此四者慎終如始故曰敬慎者仁之地也子貢問孔子曰賜為人下而未知所為人下之道也孔子曰為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言作其報而不知為人下者其猶是乎是非獨寬裕之謂也然而培塿不生松柏磽確不長禾黍故曰寬裕者仁之作也子夏問仲尼曰顔淵之為人也何若曰回之信賢於丘也曰子貢之為人何若曰賜之敏賢於丘也曰子路之為人何若曰由之勇賢於丘也曰子張之為人何若曰師之莊賢於丘也於是子夏避席而問曰然則四子何為事光生曰坐吾語汝回能信而不能反賜能敏而不能絀由能勇而不能怯師能莊而不能同兼此四者丘不為也所謂至仁之士必見進退之利屈伸之用也故曰孫接者仁之能也是非獨孫接之謂也子夏三年之喪畢見於孔子孔子與之琴援而弦之衎衎而樂作而曰先王制禮不敢不及也子曰君子也閔子騫三年之喪畢見於孔子孔子與之琴援而弦之切切而悲作而曰先王制禮不敢過也孔子曰君子也子貢問曰閔子之哀不盡子夏之哀已盡而皆為君子何也孔子曰閔子哀未盡能斷之以禮子夏哀已盡能引而致之各中其節也夫禮之有節固優者之所絀劣者之所勉也故曰禮節者仁之貌也子路曰人善我我亦善之人不善我我不善之子貢曰人善我我亦善之人不善我我則引之進退而已耳顔回曰人善我我亦善之人不善我我亦善之三子者所言各異問於夫子夫子曰由之所言蠻貊之言也賜之所言朋友之言也回之所言親屬之言也持是三言者可以觀人矣故曰言談者仁之文也仲尼將遊泰山行於郕之野見丈人焉鹿裘帶索拾穗而行歌瑟瑟然適也問其年九十有五矣是榮啓期者也問先生何樂也對曰吾樂甚多天生萬物惟人為貴而吾得為人一樂也人有男女男尊女卑而吾得為男二樂也人生有不見日月不免襁褓者吾行年既九十有五三樂也故有匡之弦歌臨河而動操援戚之起舞曳屨而頌詩皆有所取之也故曰歌樂者仁之和也曾子三仕於莒而緼袍不完子路曰夫非施及貧窮散及邦族而能如此乎晏子為相食不重肉妾不衣帛而中外待以舉火者七十餘家賈生曰吾觀於木瓜而知苞苴之行也厨有腐肉則將士不附鳬雁食粟則農夫易畝故曰分散者仁之施也漢宣帝起民間明習吏治而丙定侯又起獄吏精於法律及為相顧以三公而察吏心陋之不為也黃霸亦起卒吏習律令及為通官顧寬和不畸於法非其天性溫良而然乎其守潁川也有長史許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起頗重聽何傷且善助之無失賢者意或問其故霸曰數易長史送故迎新之貴及姦吏因緣絶薄書盜財物費耗甚多所易新吏又未必賢或不如其故徒相益為亂凡治道去其太甚者而已薛宣亦稱能吏適注律顧患部刺史與郡縣事疏言部刺史開私門聽讒佞以求吏民過失呵譴及細微轉相逼促使鄉黨缺嘉賔之歡九族忘親親之惠詩曰民之失德乾餱以愆諺曰苛政不親煩苦傷思宜明申飭使昭然知本朝之要務又如龔遂所云治亂民猶治亂繩不可急也惟緩之乃可治耳是皆溫良寬裕有得於仁本而丙吉黃霸皆起小吏捐刀筆可謂溫良者矣金日磾少輪黃門養馬武帝行觀馬後宫羅列日磾獨不敢仰視帝心異之知為休屠王太子後益親兩子皆帝弄兒磾常目之兒壯不謹遂撲殺弄兒以狀聞在上左右曰不忤視者數十年賜出宫女皆不敢近後欲納其女後宫亦堅謝不敢也使同大將軍輔少主曰勿使胸奴輔漢他如陳寵表薦輒自手書以防泄漏及在樞機不復教授以絶門徒樊楚之冠劍不解於身杜安之通書藏壁如故以至於魏有長孫儉者雪中奏事待報終日不移寸足亦可謂得仁之地者矣晉李康嘗云清者未必慎慎者必自清故敬慎仁人之所貴也何武君公為揚州刺史敷政有度時戴聖為九江太守自以大儒間有不法武或舉刺屬郡輒云後進生何知徒亂人治既武廉得其罪欲案之聖懼不免盛毁武於朝武聞之終不揚其惡而聖子為郡盜得繫廬江聖自以子必死武為平反得生始大慙服也又如劉寬典三郡未嘗一挫辱吏卒翻羹汚朝衣聲色不異疑有以自鎮者皆風氣使然亦資學問之力也隋時牛𢎞有弟弼醉射殺𢎞駕車牛𢎞還第婁迎謂曰叔射殺牛但答曰作脯妻又云此是異事但曰已知之顔色不異讀書自若是猶為弟故有盧昌衡者嘗行浚儀道中所乘馬值人牛觸死牛主前謝罪求還直昌衡謝之曰六畜相抵固其性豈人情哉君又何謝焉然是猶為畜故有李士謙者家饒財以賑施為事鄉里鬩牆為産不均輒舉資益之有奴醉與鄉人角力而斃其人惶怖請罪士謙曰本無殺心何為用謝然可逺去無為吏所得也如牛𢎞盧昌衡李士謙者可謂寬裕者矣晉劉𢎞和季江在之名儒也元康中撫荆州寬刑省賦公私賴之值陳敏叛於江東𢎞遣陶侃討之或以侃與敏有舊侃聞遣子洪詣𢎞自固𢎞曰匹夫之交猶不負本心況丈夫乎表洪為參軍遣之侃果破降敏時東海與河間治兵或説𢎞曰張光大宰腹心公既與東海宜斬光以明向背𢎞曰宰輔失德州將何與焉危人自安吾不忍為也因表用光又遺越顒書勸解兵息門不聽乃一意表率江漢每有注措貽守相手書丁寧款密人皆感悅自效咸云得劉公一紙書賢於十部從事逺矣宋謝密𢎞徹謝混之從子也諸兄弟瞻晦輩並有時譽混謂瞻等曰汝等雖才義豐贍何能愜心至於徵子吾無間然義熙中混坐劉毅黨誅混妻晉陵公主守節密産饒積千萬主壻殷好摴蒱悉供戲具內人以𢎞微孫順悉不敢爭或曰君家物産乃為殷家戲具譬棄物江海豈為廉乎𢎞微曰親戚言財為鄙之甚內人能無言豈可復道使爭耶故如劉𢎞之理國謝密之理家可謂得仁之能者矣南北分裂禮教陵夷當魏時有蘇綽僕射周惠逹稱其有王佐才嘗與宇文泰如昆明池觀魚至城漢故倉地問左石知者惟綽歷歷道之既典機密始制為文案式朱出墨入及計帳户籍之法後代遵用之又為六條詔書以理身心敦教化重農桑擢賢良恤訟獄均賦役為本務皆原性情歸仁恕懇懇有先民之遺焉是雖不専於禮讓而施於條教俱有其節文亦可謂得仁之貌者矣梁有劉瓛子圭五歲聞舅孔熙先讀管寧傳欣然慕之曰此可學耳與弟璡共據一蓬室為風所偃共正衣冠講誦不廢也袁粲薦為祕書郎不就袁粲死難微服往哭之極哀齊髙帝召入華林園咨政道答曰政在孝經但鑒前軌之失資以寬厚耳帝太息曰儒者之言可寶萬世以資輕但授記室博士不望也瓛姿形纎小採據甚博當世推為大儒比於賈鄭嘗講月令謂門徒曰江左以來隂陽厯數學廢久矣吾講此曾不能髣佛其自抑如此嘗患祖母病疽經年煮藥漬指為爛年四十未娶齊髙為娶王氏女鑿壁挂履土落母牀母不悅即遣之居憂卧廬中足為之屈杖不能起是雖無當於禮節也然推其意本於孝經施於講誦可謂得仁之貌矣江左既尚清言王何衛樂一時推重遂為月旦之餘波講學之權始然其簡約淡致不可少也衛玠嘗言人有不及可以情恕非意相干可以理遣故終身不見喜愠之色然玠為公孫蚤登華要涉世尚淺據其所得未深於輔嗣也要於出處之際過輔嗣逺矣王承王湛子也清修寡欲言不飾説獨明指要約而能通時人比之樂廣東海王越敬禮之敕其子曰學之所益者淺體之所安者深王參軍人倫之表也汝其師之見朝政漸替請出為東海太守政尚清靜不為苛察有得盜池魚者承訊之曰文王之沼與衆樂之池魚何足問乎吏縳犯夜者訊之云從師受書不覺日暮承慰遣之曰奈何鞭撻寧越以立威名既棄官束渡江逢世亂人懷危懼承每夷然不見憂喜之色一日至下邳登山北望慨然曰人言愁我始欲愁耳子述三十未知名司徒導辟為中兵屬既見無他言但問江東米價述張目不答導曰王掾不癡人何言癡也嘗燕見導發言一生歎美述正色曰人非堯舜安得每事稱善導改容謝之蓋猶有湛承之風焉顔含宏都少以操行聞引趙簡子事於夢中事病兄者也後纍官侍中時王遵隆重時論謂百僚宜降禮太常馮恍問含舍不答退而曰吾聞伐國不問仁人向者馮思祖問佞於我我豈有邪德乎為歎惋纍日郭璞嘗過含欲為之筮含曰年在天位在人修己而天不與命也守道而人不知性也自有性命無勞蓍龜璞大歎服或問江左羣士優劣答曰周伯仁之正鄧伯道之清卞望之之節餘則吾不知也故如王承顔含者可謂得仁之文者矣陶潛大司馬侃之曾孫也間靜少言不慕榮利環堵蕭然不蔽風日著文章以自娛以為任真無所先任真者洞然於天他無所得先也自以為世晉臣恥屈身異代屢徴不起嘗為州祭酒不數日解去又為彭澤令郡遣督郵行縣吏白當束帶見之潛歎曰我不能為五斗米折腰即日解印綬去賦歸去來詞又賦歸田園居詩時登廬山遊觀與逸人往還其吟詠沖適歸於自然三百篇而後未之有也宋有邵雍字堯夫世燕人也讀専苦寒不爐暑不扇夜不就枕席數年道乃通適吳楚周流齊魯梁晉之墟久之還共城廬於百源之上最後居洛陽蓬蓽環堵不蔽風雨躬爨以養父母浩然自得出與文彥博富弼司馬光程皓遊以道誼相伯仲其為詩瀟然出於簡策之外與天地萬物鼓吹醇氣故如陶潛邵雍可謂分仁之和者矣東漢時有韓韶者為羸長周恤百姓有童恢魏霸之風賊相戒不入境有流民入界者萬餘韶愍其飢困開倉廩贍之主者爭不可韶曰長活溝壑之人而以此獲罪含笑入地矣太守知韶名德無所坐陳重雷義世所稱雷陳者也並為尚書郎義代同臺郎受罪黜重亦以病免重嘗代同舍郎償負錢數十萬終不言義亦濟人死罪者以金謝堅不受金主伺義不在默委金承塵而去後發屋得金而金主已死無從還乃以付縣曹故如陳雷是惟有意為善非市之也李士謙嘗出粟數千石貸閭里租值歲歉莫能償羣趣謝士謙曰吾本國賑贍豈求利哉設酒食焚券罷之後歲熟來償訖不受值大飢設粥待餓者全活以萬計或謂士謙曰子隂德多矣其必有後士謙曰所謂陰德猶之耳鳴已獨知之耳今吾所作汝俱知何謂陰德哉故如韓韶李士謙可謂得仁之施者矣臣觀諸臣皆行不純儒而中心質實無欺世盜名利祿自與之事使之及於孔門則顔閔參思之間未為逺也但其志事近衷論久乃定即當時人主亦未能盡知焉表記曰子言之仁有數義有長短小大中心憯怛愛人之仁也率法而強之資仁者也詩云豐水有芑武王豈不仕詒厥孫謀以燕翼子數世之仁也國風曰我今不閲皇恤我後終身之仁也子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以仁望人則賢者可知己矣又曰中心安仁者天下一人而已大雅曰德輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孽孽斃而後已夫如表記所稱則可謂尊讓仁者矣子曰無欲而好仁者無畏而惡不仁者天下一人而已是故君子議道自已而置法以民子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也又曰仁之難成久矣人人失其所好故仁者之過易辭也夫子於仁之難成再致歎焉故天下之尊讓仁者未有如夫子者也臣觀夫子以同過論仁又曰觀過知仁即如上十六條之事率心而行之事事有過必以過棄人則天下無完人矣要其本於學問澡身浴德不可少也命儒章第十八儒有不隕穫於貧賤不充詘於富貴不慁君王不纍長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舍哀公館之聞此言也言加信行加義終沒吾世不敢以儒為戲道之絀於勢者無他曰貧賤而已矣自以為貧賤則貧賤之人也自以為富貴則富貴之人也貧賤富貴人所自命衆亦共命之而皆有慁於君王纍於長上閔於有司儒者無有也衆所謂貧賤儒者不以為貧賤衆所謂富貴儒者不以為富貴儒者亦仁而已仁而後成人成人而後成天成天而後君王長上有司之所從受命也易曰自天佑之吉無不利子曰佑者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天佑之吉無不利是蓋王者之事而儒者亦有焉儒者不以貧賤而慕富貴不以富貴而傲貧賤亦不以貧賤而驕富貴富貴而引貧賤是則儒者之信順儒者之尚賢也故曰天命不佑有妄之事也自天佑之無妄之事也無妄之於大有其致一也不寶金玉不祈土地見利不虧其義見死不更其守身可危志不可奪近文章砥厲廉隅若此則何隕穫於貧賤之有古之人有行之者原憲曾參巫馬期之徒是也懷忠信以待舉力行以待取難得易祿易祿難畜居處不淫飲食不溽上答之不敢以疑不答之不敢以諂忠信之義優遊之法慎靜而尚寬𢎞毅以與人若此則何充詘於富貴之有古之人有行之者蘧瑗季札子産晏嬰之徒是也難進易退齊難恭敬道塗不爭險易冬夏不爭隂陽先勞而後祿上通而不困陳言而伏靜而正之分國如錙銖不臣不仕若此則何恩君王之有衣冠中動作慎愛死有待養身有為戴仁抱義雖有暴政不更其所雖危起居竟信其志義同而進不同而退如此則何纍長上之有非時不見非義不合過言不再流言不極易衣而出并日而食不臨深以為髙不加少以為多並立則樂相下不厭如此則何閔有司之有古之人有行之者黃憲陳實仇覽管寧徐稚申屠蟠沈麟士元德秀孔嵩閔貢屠羊説之徒是也三代而下溺於言説其有進於是行者蓋亦寡矣臣觀聖賢所論人才成德大約盡於是編人主習觀是編則取士之方盡矣宋儒髙閌溺於時尚不知力行求仁之説以為儒行一篇學不純經不宜與大學中庸並稱考其意以毁方瓦合則張禹孔光見詆於前相死相先則李杜尹劉見推於後然而容衆慮下逹人所稽義命久要孔門屢歎道有不同歸仁一而已故其終篇曰言加信行加義終沒吾世不敢以儒為戲亦以教求仁之貴精力行之未易也魯哀公問於孔子曰吾欲論吾國之士與之為政何如孔子對曰生乎今之世志古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰然則今夫章甫句屨紳帶而搢笏者皆賢乎孔子曰否不然端衣玄裳冕而乘路者志不在於食葷斬衰蕳屨杖而啜粥者志不在於飲食生今之世志古之道居今之俗服古之服舍此而為非者不亦鮮乎哀公曰善何如則可謂庸人矣孔子對曰所謂庸人者口不能道善言而志不邑邑不能選賢善而托身焉以為己憂動行不知所務止立不知所定日選於物不知所貴從物而流不知所歸五鑿為政心從而壞若此則可謂庸人矣哀公曰何如則可謂士矣孔子對曰所謂士者雖不盡道術必有所繇焉雖不盡美必有所處焉是故知不務多務審其所知行不務多務審其所繇言不務多務審其所謂知既知之行既繇之言既順之若夫性命肌膚之不可易也富貴不足以益貧賤不足以損若此則可謂士矣哀公曰何如則可謂君子矣孔子對曰所謂君子者躬行忠信其心不賈仁義在己而不害不知聞志廣博而色不伐思慮明達而辭不爭君子猶然如將可及也而不可及也如此可謂君子矣哀公曰善敢問何如則可謂賢人矣孔子對曰所謂賢人者好惡與民同情取舍與民同流行中矩繩而不傷於本言足法於天下而不害於其身躬為匹夫願富貴為諸侯而無財如此則可謂賢人矣哀公曰善敢問何如可謂聖人矣孔子對曰所謂聖人者知通乎大道應變而不窮能測萬物之情性者也大道者所以變化而凝成萬物者也情性也者所以理然不然取舍者也故其事大配乎天地參乎日月雜於雲霓總要萬物穆穆純純其莫之能循若天之司莫之能職百姓淡然不知其善若此則可謂聖人矣哀公曰善孔子出哀公送之臣觀是篇原始服行以列五品與儒行同意然而儒行精微矣儒行以𢎞毅為本以任重致逺為務於窮達不變造次顛沛不離之意同旨十六章百二十二義為參兩根本明主用之以贊襄天地得其一行一事皆足以顯為王佐潛稱人師凡論語中所論古近行事與孟子所論聖人丈夫先後合節也東漢諸儒推準儒行以為人極其時武人稚子皆能特立砥厲不藉誦説有以自見使大梟巨雄如卓操之徒尚僶俯以畏名士統天用人之主能採是篇以定士彚振人心砥風俗辨爵位則公卿侍從常臬尹伯百執有司黨正之屬咸就其職讒諂面諛猥汚貪黷之徒可以不煩蕭斧而治也儒行集傳卷下
