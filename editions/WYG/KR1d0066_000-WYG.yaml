body:
  text: 儒行集傳禮類三禮記之屬提要臣等謹案儒行集傳二卷明黄道周撰道周有三易洞璣别著録是編取儒行一篇分十七章上卷之目曰服行第一自立第二容貌第三備豫第四近人第五特立第六剛毅第七又自立章第八下卷之目曰儒仕第九憂思第十寛裕第十一舉賢第十二任舉第十三特立獨行第十四規為第十五交友第十六尊讓第十七其篇目皆道周所創然其自立有如此者其剛毅有如此者本經文所有較之坊記表記之目近於自然又儒行篇先儒譏其不純以為非孔子之言以其詞氣近於矜張非中和氣象道周負氣敢言以直節清徳見重一時故獨有取於此篇其所集之傳則雜引厯代史傳而以某某為能自立某某為剛毅在上之取士執此為則定取舎之衡則用人不迷於所趨故其自序云仲尼恐後世不學不知先王之道存於儒者故備舉以明之使後之天子循名考實知人善任為天下得人此其作書之本㫖也大抵道周諸經其用功最深者莫如三易洞璣易象正觀其與及門朱朝瑛何瑞圓劉履丁輩往復商搉至再至三所謂一生精力盡在此書者也故最為奥博即孝經集傳亦厯六年而成推衍極為深至若禮記五篇則意不主於解經不過目擊時事之非借經以抒其忠憤又一年之中輯書五種亦成之太易故考証時或有踈特以其為一代偉人又引君當道之心有足多者故至今尚重其書焉乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7bcade3a377fabe0b92158bd6d20e69833be00b64f8144d9674e046877905501
